name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read

jobs:
  format:
    name: Format check
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Format
        run: nix fmt .

      - name: Ensure clean working tree
        run: |
          git status --short
          if ! git diff --quiet --exit-code; then
            echo "Repository dirty after formatting. Please commit formatting changes."
            exit 1
          fi

  get-hosts-check:
    name: get-hosts check
    needs:
      - plan-build-matrix
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run get-hosts test
        run: ./tests/test-get-hosts.sh

  plan-build-matrix:
    name: plan build matrix
    runs-on: ubuntu-slim
    outputs:
      docs_only: ${{ steps.plan.outputs.docs_only }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: plan
        uses: actions/github-script@v8
        with:
          script: |
            const fullMatrix = {
              include: [
                { name: "frame (x86_64-linux)", cmd: "make nixos WHAT=frame", os: "ubuntu-latest" },
                { name: "nvws (x86_64-linux)", cmd: "make nixos WHAT=nvws", os: "ubuntu-latest" },
                { name: "prx1-lab (x86_64-linux)", cmd: "make nixos WHAT=prx1-lab", os: "ubuntu-latest" },
                { name: "prx2-lab (x86_64-linux)", cmd: "make nixos WHAT=prx2-lab", os: "ubuntu-latest" },
                { name: "prx3-lab (x86_64-linux)", cmd: "make nixos WHAT=prx3-lab", os: "ubuntu-latest" },
                { name: "builder (x86_64-linux)", cmd: "make nixos WHAT=prox-builder1vm", os: "ubuntu-latest" },
                { name: "cache (x86_64-linux)", cmd: "make nixos WHAT=prox-cachevm", os: "ubuntu-latest" },
                { name: "pi5 dhcp (aarch64-linux)", cmd: "make nixos WHAT=pi5", os: "ubuntu-24.04-arm" },
                { name: "beast (x86_64-linux)", cmd: "make nixos WHAT=beast", os: "ubuntu-latest" },
                { name: "srvarr (x86_64-linux)", cmd: "make nixos WHAT=prox-srvarrvm", os: "ubuntu-latest" },
                { name: "nixos vm builder1 (x86_64-linux)", cmd: "nix build .#nixosConfigurations.prox-builder1vm.config.system.build.vm -L --show-trace", os: "ubuntu-latest" },
                { name: "home-manager nv (x86_64-linux)", cmd: "make linux-home TARGET=nv USERNAME=ihrachyshka", os: "ubuntu-latest" },
                { name: "home-manager mair (aarch64-darwin)", cmd: "make darwin-home TARGET=mair USERNAME=ihrachyshka", os: "macos-26" },
                { name: "mair-ci (aarch64-darwin)", cmd: "make darwin WHAT=mair-ci", os: "macos-26" },
                { name: "mmini-ci (aarch64-darwin)", cmd: "make darwin WHAT=mmini-ci", os: "macos-26" },
                { name: "JGWXHWDL4X-ci (aarch64-darwin)", cmd: "make darwin WHAT=JGWXHWDL4X-ci", os: "macos-26" },
                { name: "nixos vm qemu (x86_64-linux)", cmd: "nix build .#nixosConfigurations.prox-builder1vm.config.system.build.vmQemu -L --show-trace", os: "ubuntu-latest" },
                { name: "nixos vm qemu (aarch64-darwin)", cmd: "nix build .#nixosConfigurations.local-builder1vm.config.system.build.vmQemu -L --show-trace", os: "macos-26" },
                { name: "nixos vm proxmox iso (x86_64-linux)", cmd: "nix build .#nixosConfigurations.prox-builder1vm.config.virtualisation.proxmox.iso -L --show-trace", os: "ubuntu-latest" }
              ]
            };

            if (context.eventName !== "pull_request") {
              core.info("Non-PR event, using full build matrix.");
              core.setOutput("docs_only", "false");
              core.setOutput("matrix", JSON.stringify(fullMatrix));
              return;
            }

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            const paths = changedFiles.map((f) => f.filename);
            core.info(`Changed files (${paths.length}): ${paths.join(", ")}`);

            const isDocPath = (path) =>
              path === "README.md" ||
              path.startsWith("docs/") ||
              path.endsWith(".md");
            const docsOnly = paths.length > 0 && paths.every(isDocPath);
            if (docsOnly) {
              core.info("Docs-only pull request detected, skipping heavy build jobs.");
              core.setOutput("docs_only", "true");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              return;
            }
            core.setOutput("docs_only", "false");

            const onlyDarwinPaths = paths.length > 0 && paths.every((p) => p.startsWith("darwin/"));
            const onlyNixosPaths = paths.length > 0 && paths.every((p) => p.startsWith("nixos/"));

            let candidateInclude = fullMatrix.include;
            if (onlyDarwinPaths) {
              candidateInclude = fullMatrix.include.filter((item) => item.os.startsWith("macos-"));
              core.info(`Darwin-only change detected, scoping matrix to ${candidateInclude.length} macOS job(s).`);
            } else if (onlyNixosPaths) {
              candidateInclude = fullMatrix.include.filter((item) => !item.os.startsWith("macos-"));
              core.info(`NixOS-only change detected, scoping matrix to ${candidateInclude.length} Linux job(s).`);
            }

            const machinePathMap = [
              { prefix: "nixos/frame/", jobs: [ "frame (x86_64-linux)" ] },
              { prefix: "nixos/nvws/", jobs: [ "nvws (x86_64-linux)" ] },
              { prefix: "nixos/prx1-lab/", jobs: [ "prx1-lab (x86_64-linux)" ] },
              { prefix: "nixos/prx2-lab/", jobs: [ "prx2-lab (x86_64-linux)" ] },
              { prefix: "nixos/prx3-lab/", jobs: [ "prx3-lab (x86_64-linux)" ] },
              { prefix: "nixos/pi5/", jobs: [ "pi5 dhcp (aarch64-linux)" ] },
              { prefix: "nixos/beast/", jobs: [ "beast (x86_64-linux)" ] },
              { prefix: "nixos/srvarrvm/", jobs: [ "srvarr (x86_64-linux)" ] },
              { prefix: "nixos/cachevm/", jobs: [ "cache (x86_64-linux)" ] },
              { prefix: "darwin/mair/", jobs: [ "mair-ci (aarch64-darwin)", "home-manager mair (aarch64-darwin)" ] },
              { prefix: "darwin/mmini/", jobs: [ "mmini-ci (aarch64-darwin)" ] },
              { prefix: "darwin/JGWXHWDL4X/", jobs: [ "JGWXHWDL4X-ci (aarch64-darwin)" ] },
              { prefix: "secrets/frame.yaml", jobs: [ "frame (x86_64-linux)" ] },
              { prefix: "secrets/prx1-lab.yaml", jobs: [ "prx1-lab (x86_64-linux)" ] },
              { prefix: "secrets/prx2-lab.yaml", jobs: [ "prx2-lab (x86_64-linux)" ] },
              { prefix: "secrets/prx3-lab.yaml", jobs: [ "prx3-lab (x86_64-linux)" ] },
              { prefix: "secrets/pi5.yaml", jobs: [ "pi5 dhcp (aarch64-linux)" ] },
              { prefix: "secrets/beast.yaml", jobs: [ "beast (x86_64-linux)" ] },
              { prefix: "secrets/prox-srvarrvm.yaml", jobs: [ "srvarr (x86_64-linux)" ] },
              { prefix: "secrets/mair.yaml", jobs: [ "mair-ci (aarch64-darwin)" ] },
              { prefix: "secrets/mmini.yaml", jobs: [ "mmini-ci (aarch64-darwin)" ] },
              { prefix: "secrets/nvws.yaml", jobs: [ "nvws (x86_64-linux)" ] },
              { prefix: "secrets/prox-builder1vm.yaml", jobs: [ "builder (x86_64-linux)" ] },
              { prefix: "secrets/prox-cachevm.yaml", jobs: [ "cache (x86_64-linux)" ] },
              { prefix: "secrets/JGWXHWDL4X.yaml", jobs: [ "JGWXHWDL4X-ci (aarch64-darwin)" ] }
            ];

            const selected = new Set();
            let onlyMachineSpecific = paths.length > 0;

            for (const filePath of paths) {
              let matched = false;
              for (const mapping of machinePathMap) {
                if (filePath.startsWith(mapping.prefix)) {
                  for (const jobName of mapping.jobs) {
                    selected.add(jobName);
                  }
                  matched = true;
                  break;
                }
              }
              if (!matched) {
                onlyMachineSpecific = false;
                break;
              }
            }

            let matrix = { include: candidateInclude };
            if (onlyMachineSpecific && selected.size > 0) {
              matrix = {
                include: candidateInclude.filter((item) => selected.has(item.name))
              };
              core.info(`Using machine-specific build matrix with ${matrix.include.length} job(s).`);
            } else {
              core.info(`Using scoped/full build matrix with ${matrix.include.length} job(s).`);
            }

            core.setOutput("matrix", JSON.stringify(matrix));

  build:
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    needs:
      - format
      - get-hosts-check
      - plan-build-matrix
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-matrix.outputs.matrix) }}

    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.cmd }}

  ci-success:
    name: CI (all jobs)
    if: ${{ always() }}
    needs:
      - plan-build-matrix
      - format
      - get-hosts-check
      - build
    runs-on: ubuntu-slim
    steps:
      - name: Check job results
        run: |
          set -euo pipefail

          if [ "${{ needs.plan-build-matrix.result }}" != "success" ] || [ "${{ needs.format.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "plan-build-matrix=${{ needs.plan-build-matrix.result }}"
            echo "format=${{ needs.format.result }}"
            exit 1
          fi

          if [ "${{ needs.plan-build-matrix.outputs.docs_only }}" = "true" ]; then
            echo "Docs-only change detected; skipped get-hosts-check and build."
            echo "All CI jobs passed."
            exit 0
          fi

          if [ "${{ needs.get-hosts-check.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "get-hosts-check=${{ needs.get-hosts-check.result }}"
            echo "build=${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
