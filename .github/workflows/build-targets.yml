name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read

jobs:
  format:
    name: Format check
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Format
        run: nix fmt .

      - name: Ensure clean working tree
        run: |
          git status --short
          if ! git diff --quiet --exit-code; then
            git --no-pager diff --stat --patch
            echo "Repository dirty after formatting. Please commit formatting changes."
            exit 1
          fi

  get-hosts-check:
    name: get-hosts check
    needs:
      - plan-build-matrix
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run get-hosts test
        run: ./tests/test-get-hosts.sh

  plan-build-matrix:
    name: plan build matrix
    runs-on: ubuntu-slim
    outputs:
      docs_only: ${{ steps.plan.outputs.docs_only }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute build matrix
        id: plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const planner = require("./.github/scripts/plan-ci-matrix.js");
            const targetInventory = require("./.github/scripts/ci-target-inventory.js");
            const buildTargets = targetInventory.inventory.buildTargets;
            const fullMatrix = {
              include: targetInventory.toBuildMatrixEntries(buildTargets)
            };
            const machinePathMap = targetInventory.buildMachinePathMap(buildTargets, "jobs");

            if (context.eventName !== "pull_request") {
              core.info("Non-PR event, using full build matrix.");
              core.setOutput("docs_only", "false");
              core.setOutput("matrix", JSON.stringify(fullMatrix));
              return;
            }

            const result = await planner.planMatrix({
              context,
              github,
              eventName: context.eventName,
              fullMatrix,
              machinePathMap,
              mappingField: "jobs",
              skipWhenDocsOnly: true,
              skipWhenSelectionEmpty: true,
              scopeByOs: true,
            });
            core.info(`Changed files (${result.paths.length}): ${result.paths.join(", ")}`);
            core.info(`Selection files (${result.selectionPaths.length}): ${result.selectionPaths.join(", ")}`);
            if (result.docsOnly) {
              core.setOutput("docs_only", "true");
              core.info("Docs-only pull request detected, skipping heavy build jobs.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              return;
            }
            if (result.ignoredOnly) {
              core.setOutput("docs_only", "true");
              core.info("Only selection-neutral files changed, skipping heavy build jobs.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              return;
            }
            core.setOutput("docs_only", "false");
            if (result.scopeReason === "darwin") {
              core.info(`Darwin-only change detected, scoping matrix to ${result.matrix.include.length} macOS job(s).`);
            } else if (result.scopeReason === "nixos") {
              core.info(`NixOS-only change detected, scoping matrix to ${result.matrix.include.length} Linux job(s).`);
            }
            core.info(
              result.machineSpecific
                ? `Using machine-specific build matrix with ${result.matrix.include.length} job(s).`
                : `Using scoped/full build matrix with ${result.matrix.include.length} job(s).`
            );

            core.setOutput("matrix", JSON.stringify(result.matrix));

  build:
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    needs:
      - format
      - get-hosts-check
      - plan-build-matrix
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-matrix.outputs.matrix) }}

    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.cmd }}

  wait-flake-update-diffs:
    name: wait config diffs
    runs-on: ubuntu-latest
    timeout-minutes: 190
    steps:
      - name: Wait for config diffs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;

            if (context.eventName !== "pull_request") {
              core.info("Not a pull request event; no config diff workflow to wait for.");
              return;
            }

            const workflowId = "flake-update-diffs.yml";
            const headSha = context.payload.pull_request.head.sha;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const deadline = Date.now() + 185 * 60 * 1000;
            let lastRunId = null;

            core.info(`Waiting for ${workflowId} on ${headSha}.`);
            while (Date.now() < deadline) {
              let runs = [];
              try {
                const response = await github.request(
                  "GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs",
                  {
                    owner,
                    repo,
                    workflow_id: workflowId,
                    event: "pull_request",
                    head_sha: headSha,
                    per_page: 10,
                  },
                );
                runs = response.data.workflow_runs || [];
              } catch (error) {
                core.warning(`Could not list config diff workflow runs; retrying: ${error.message}`);
                await sleep(30 * 1000);
                continue;
              }

              const run = runs.sort(
                (left, right) => new Date(right.created_at) - new Date(left.created_at),
              )[0];
              if (!run) {
                core.info("Config diff workflow run has not appeared yet.");
                await sleep(20 * 1000);
                continue;
              }

              if (run.id !== lastRunId) {
                core.info(`Watching config diff workflow run ${run.html_url}`);
                lastRunId = run.id;
              }

              if (run.status === "completed") {
                core.info(
                  `Config diff workflow completed with conclusion: ${run.conclusion || "unknown"}.`,
                );
                return;
              }

              core.info(`Config diff workflow status is ${run.status}; waiting.`);
              await sleep(30 * 1000);
            }

            core.warning("Timed out waiting for config diff workflow; not blocking CI.");

  ci-success:
    name: CI (all jobs)
    if: ${{ always() }}
    needs:
      - plan-build-matrix
      - format
      - get-hosts-check
      - build
      - wait-flake-update-diffs
    runs-on: ubuntu-slim
    steps:
      - name: Check job results
        run: |
          set -euo pipefail

          if [ "${{ needs.plan-build-matrix.result }}" != "success" ] || [ "${{ needs.format.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "plan-build-matrix=${{ needs.plan-build-matrix.result }}"
            echo "format=${{ needs.format.result }}"
            exit 1
          fi

          if [ "${{ needs.plan-build-matrix.outputs.docs_only }}" = "true" ]; then
            echo "Docs-only change detected; skipped get-hosts-check and build."
            echo "All CI jobs passed."
            exit 0
          fi

          if [ "${{ needs.get-hosts-check.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "get-hosts-check=${{ needs.get-hosts-check.result }}"
            echo "build=${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
