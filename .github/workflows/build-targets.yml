name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read

jobs:
  format:
    name: Format check
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Format
        run: nix fmt .

      - name: Ensure clean working tree
        run: |
          git status --short
          if ! git diff --quiet --exit-code; then
            git --no-pager diff --stat --patch
            echo "Repository dirty after formatting. Please commit formatting changes."
            exit 1
          fi

  get-hosts-check:
    name: get-hosts check
    needs:
      - plan-build-matrix
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run get-hosts test
        run: ./tests/test-get-hosts.sh

  plan-build-matrix:
    name: plan build matrix
    runs-on: ubuntu-slim
    outputs:
      docs_only: ${{ steps.plan.outputs.docs_only }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Compute build matrix
        id: plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const planner = require("./.github/scripts/plan-ci-matrix.js");
            const targetInventory = require("./.github/scripts/ci-target-inventory.js");
            const buildTargets = targetInventory.inventory.buildTargets;
            const fullMatrix = {
              include: targetInventory.toBuildMatrixEntries(buildTargets)
            };
            const machinePathMap = targetInventory.buildMachinePathMap(buildTargets, "jobs");

            if (context.eventName !== "pull_request") {
              core.info("Non-PR event, using full build matrix.");
              core.setOutput("docs_only", "false");
              core.setOutput("matrix", JSON.stringify(fullMatrix));
              return;
            }

            const result = await planner.planMatrix({
              context,
              github,
              eventName: context.eventName,
              fullMatrix,
              machinePathMap,
              mappingField: "jobs",
              skipWhenDocsOnly: true,
              skipWhenSelectionEmpty: true,
              scopeByOs: true,
            });
            core.info(`Changed files (${result.paths.length}): ${result.paths.join(", ")}`);
            core.info(`Selection files (${result.selectionPaths.length}): ${result.selectionPaths.join(", ")}`);
            if (result.docsOnly) {
              core.setOutput("docs_only", "true");
              core.info("Docs-only pull request detected, skipping heavy build jobs.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              return;
            }
            if (result.ignoredOnly) {
              core.setOutput("docs_only", "true");
              core.info("Only selection-neutral files changed, skipping heavy build jobs.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              return;
            }
            core.setOutput("docs_only", "false");
            if (result.scopeReason === "darwin") {
              core.info(`Darwin-only change detected, scoping matrix to ${result.matrix.include.length} macOS job(s).`);
            } else if (result.scopeReason === "nixos") {
              core.info(`NixOS-only change detected, scoping matrix to ${result.matrix.include.length} Linux job(s).`);
            }
            core.info(
              result.machineSpecific
                ? `Using machine-specific build matrix with ${result.matrix.include.length} job(s).`
                : `Using scoped/full build matrix with ${result.matrix.include.length} job(s).`
            );

            core.setOutput("matrix", JSON.stringify(result.matrix));

  build:
    if: needs.plan-build-matrix.outputs.docs_only != 'true'
    needs:
      - format
      - get-hosts-check
      - plan-build-matrix
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-build-matrix.outputs.matrix) }}

    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.cmd }}

      - name: Resolve checked-out revision
        if: ${{ github.event_name == 'pull_request' && matrix.diff_machine != '' }}
        id: checked-out-revision
        shell: bash
        run: printf 'sha=%s\n' "$(git rev-parse HEAD)" >>"${GITHUB_OUTPUT}"

      - name: Generate config diff
        if: ${{ github.event_name == 'pull_request' && matrix.diff_machine != '' }}
        continue-on-error: true
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ steps.checked-out-revision.outputs.sha }}
          MACHINE: ${{ matrix.diff_machine }}
          MACHINE_NAME: ${{ matrix.name }}
          ORDER: ${{ matrix.diff_order }}
        run: |
          set -euo pipefail

          mkdir -p diff-output
          safe_machine="$(
            printf '%s' "${MACHINE}" \
              | tr -c 'A-Za-z0-9._-' '-'
          )"
          package_or_config_file="diff-output/package-or-config-${ORDER}-${safe_machine}.md"
          size_only_file="diff-output/size-only-${ORDER}-${safe_machine}.md"
          unchanged_file="diff-output/unchanged-${ORDER}-${safe_machine}.txt"
          stdout_file="$(mktemp)"
          stderr_file="$(mktemp)"

          is_noop_diff() {
            local file="$1"

            if [ ! -s "${file}" ]; then
              return 0
            fi

            awk '
              NF {
                line = $0
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                lines[++n] = line
              }
              END {
                i = 1

                if (lines[i] ~ /^PATHS: /) {
                  paths = lines[i]
                  sub(/^PATHS: /, "", paths)

                  if (paths !~ /^[0-9]+ -> [0-9]+ \(\+0, -0\)$/) {
                    exit 1
                  }

                  old_paths = paths
                  sub(/ -> .*/, "", old_paths)
                  new_paths = paths
                  sub(/^[0-9]+ -> /, "", new_paths)
                  sub(/ \(\+0, -0\)$/, "", new_paths)
                  if (old_paths != new_paths) {
                    exit 1
                  }

                  i++
                }

                if (lines[i] !~ /^SIZE: / || lines[i + 1] != "DIFF: 0 bytes") {
                  exit 1
                }

                size = lines[i]
                i += 2

                if (i <= n && lines[i] == "No generated config differences.") {
                  i++
                }
                if (i <= n) {
                  exit 1
                }

                sub(/^SIZE: /, "", size)
                count = split(size, parts, / -> /)
                if (count != 2 || parts[1] != parts[2]) {
                  exit 1
                }
              }
            ' "${file}"
          }

          has_package_or_version_rows() {
            local file="$1"

            awk '
              /^\[[^]]+\][[:space:]]+[^[:space:]]/ {
                line = $0
                sub(/^\[[^]]+\][[:space:]]+/, "", line)

                # dix 2.x emits size-only package rows such as:
                # [C.] source         +85.8 KiB
                # Keep those in the minor bucket; rows with versions,
                # additions, removals, or upgrades still count as major.
                if (line ~ /^[^[:space:]]+[[:space:]]+[+-]?[0-9]+([.][0-9]+)?[[:space:]]+([KMGTPEZY]iB|bytes?)$/) {
                  next
                }

                found = 1
              }
              END {
                exit found ? 0 : 1
              }
            ' "${file}"
          }

          has_generated_config_diff() {
            local file="$1"

            if grep -Fq 'No generated config differences.' "${file}"; then
              return 1
            fi

            grep -Eq '^(diff -ruN |Only in |Files .* differ|Binary files .* differ|--- |\+\+\+ |@@ )' "${file}"
          }

          is_size_only_diff() {
            local file="$1"

            grep -Eq '^SIZE: .+ -> .+$' "${file}" \
              && grep -Eq '^DIFF: .+$' "${file}" \
              && ! has_package_or_version_rows "${file}" \
              && ! has_generated_config_diff "${file}"
          }

          set +e
          nix run .#diff -- --details "${MACHINE}" "${BASE_SHA}" "${HEAD_SHA}" >"${stdout_file}" 2>"${stderr_file}"
          status="$?"
          set -e

          if [ "${status}" -eq 0 ] && is_noop_diff "${stdout_file}"; then
            printf '%s\n' "${MACHINE_NAME}" >"${unchanged_file}"
            printf 'Config diff for %s: no changes\n\n' "${MACHINE_NAME}"
            cat "${stdout_file}"
            exit 0
          fi

          diff_file="${package_or_config_file}"
          details_tag="<details open>"
          if [ "${status}" -eq 0 ] && is_size_only_diff "${stdout_file}"; then
            diff_file="${size_only_file}"
            details_tag="<details>"
          fi

          {
            printf '%s\n' "${details_tag}"
            printf '<summary>%s</summary>\n\n' "${MACHINE_NAME}"
            printf '```text\n'
            if [ "${status}" -ne 0 ]; then
              printf 'diff generation failed with exit code %s\n\n' "${status}"
              if [ -s "${stderr_file}" ]; then
                printf 'stderr:\n'
                cat "${stderr_file}"
                printf '\n'
              fi
              if [ -s "${stdout_file}" ]; then
                printf 'stdout:\n'
                cat "${stdout_file}"
                printf '\n'
              fi
            else
              cat "${stdout_file}"
            fi
            printf '```\n\n'
            printf '</details>\n'
          } >"${diff_file}"

          printf 'Config diff for %s:\n\n' "${MACHINE_NAME}"
          cat "${diff_file}"

      - name: Upload config diff artifact
        if: ${{ github.event_name == 'pull_request' && matrix.diff_machine != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: config-diff-${{ matrix.diff_order }}-${{ matrix.diff_machine }}
          path: diff-output/*
          if-no-files-found: warn

  post-config-diffs:
    name: post config diffs
    needs:
      - plan-build-matrix
      - format
      - get-hosts-check
      - build
    if: >-
      ${{
        always() &&
        github.event_name == 'pull_request' &&
        needs.plan-build-matrix.result == 'success' &&
        needs.format.result == 'success' &&
        needs.get-hosts-check.result == 'success' &&
        needs.plan-build-matrix.outputs.docs_only != 'true' &&
        needs.build.result == 'success'
      }}
    runs-on: ubuntu-slim
    continue-on-error: true
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Download config diff artifacts
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: config-diff-*
          path: diff-output
          merge-multiple: true

      - name: Post config diffs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BUILD_MATRIX: ${{ needs.plan-build-matrix.outputs.matrix }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          retries: 3
          script: |
            const fs = require("fs");
            const path = require("path");

            const { owner, repo } = context.repo;
            const diffDir = "diff-output";

            const pull = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: context.payload.pull_request.number,
            });
            const currentPrHeadSha = pull.data.head.sha;
            const runPrHeadSha = process.env.PR_HEAD_SHA;
            if (currentPrHeadSha !== runPrHeadSha) {
              core.notice(
                `Skipping config diff comment for stale PR head ${runPrHeadSha}; current head is ${currentPrHeadSha}.`,
              );
              return;
            }

            let plannedMatrix = { include: [] };
            try {
              plannedMatrix = JSON.parse(process.env.BUILD_MATRIX || "{\"include\":[]}");
            } catch (error) {
              core.warning(`Could not parse planned build matrix: ${error.message}`);
            }

            const safeMachineName = (machine) => machine.replace(/[^A-Za-z0-9._-]/g, "-");
            const expectedDiffEntries = (plannedMatrix.include || [])
              .filter((entry) => entry.diff_machine)
              .map((entry) => ({
                key: `${entry.diff_order}-${safeMachineName(entry.diff_machine)}`,
                machine: entry.diff_machine,
                name: entry.name,
              }));

            const artifactKeys = new Set();
            let packageChangeEntries = [];
            let sizeOnlyEntries = [];
            let unchangedEntries = [];
            if (fs.existsSync(diffDir)) {
              const files = fs.readdirSync(diffDir).sort();
              for (const name of files) {
                const match = name.match(
                  /^(?:changed|package-or-config|size-only|unchanged)-(.+)\.(?:md|txt)$/,
                );
                if (match) {
                  artifactKeys.add(match[1]);
                }
              }
              packageChangeEntries = files
                .filter((name) => /^(?:changed|package-or-config)-.+\.md$/.test(name))
                .map((name) =>
                  fs.readFileSync(path.join(diffDir, name), "utf8").trim()
                )
                .filter(Boolean);
              sizeOnlyEntries = files
                .filter((name) => /^size-only-.+\.md$/.test(name))
                .map((name) =>
                  fs.readFileSync(path.join(diffDir, name), "utf8").trim()
                )
                .filter(Boolean);
              unchangedEntries = files
                .filter((name) => name.endsWith(".txt"))
                .flatMap((name) =>
                  fs
                    .readFileSync(path.join(diffDir, name), "utf8")
                    .split(/\r?\n/)
                    .map((line) => line.trim())
                    .filter(Boolean)
                );
            }
            const missingEntries = expectedDiffEntries.filter(
              (entry) => !artifactKeys.has(entry.key),
            );
            if (missingEntries.length > 0) {
              core.notice(
                `Skipping config diff comment because ${missingEntries.length} expected diff artifact(s) were not downloaded.`,
              );
              for (const entry of missingEntries) {
                core.notice(`Missing config diff artifact for ${entry.name} (${entry.machine}).`);
              }
              return;
            }

            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const prHeadSha = process.env.PR_HEAD_SHA;
            const runUrl = process.env.RUN_URL;
            const maxCommentLength = 60000;
            const maxComments = 10;
            const chunkLength = 59000;
            const commentMarker = "<!-- nix-config-diffs-comment -->";
            const commentSignature =
              "Advisory output from `nix run .#diff -- --details <machine> <base> <head>`.";
            const shouldAutoMerge =
              expectedDiffEntries.length > 0 && packageChangeEntries.length === 0;

            const isConfigDiffComment = (body) =>
              body.includes(commentMarker) ||
              (body.startsWith("## Config diffs") && body.includes(commentSignature));
            const normalizeLogin = (login) => (login || "").replace(/\[bot\]$/, "");

            const fetchBotLogin = async () => {
              try {
                const result = await github.graphql(`
                  query {
                    viewer {
                      login
                    }
                  }
                `);
                return result.viewer.login;
              } catch (error) {
                core.warning(`Could not resolve authenticated bot user: ${error.message}`);
                return "github-actions[bot]";
              }
            };

            const fetchPullRequestComments = async () => {
              const comments = [];
              let cursor = null;
              let hasNextPage = true;

              while (hasNextPage) {
                const result = await github.graphql(
                  `
                    query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $number) {
                          comments(first: 100, after: $cursor) {
                            nodes {
                              id
                              body
                              isMinimized
                              url
                              author {
                                login
                              }
                            }
                            pageInfo {
                              hasNextPage
                              endCursor
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    owner,
                    repo,
                    number: context.payload.pull_request.number,
                    cursor,
                  },
                );

                const connection = result.repository.pullRequest.comments;
                comments.push(...connection.nodes);
                hasNextPage = connection.pageInfo.hasNextPage;
                cursor = connection.pageInfo.endCursor;
              }

              return comments;
            };

            const markPreviousConfigDiffCommentsObsolete = async () => {
              let previousComments = [];
              try {
                const botLogin = await fetchBotLogin();
                const comments = await fetchPullRequestComments();
                previousComments = comments.filter(
                  (comment) =>
                    !comment.isMinimized &&
                    normalizeLogin(comment.author?.login) === normalizeLogin(botLogin) &&
                    isConfigDiffComment(comment.body || ""),
                );
              } catch (error) {
                core.warning(`Could not inspect previous config diff comments: ${error.message}`);
                return;
              }

              if (previousComments.length === 0) {
                return;
              }

              core.notice(
                `Marking ${previousComments.length} previous config diff comment(s) as outdated.`,
              );
              for (const comment of previousComments) {
                try {
                  await github.graphql(
                    `
                      mutation($subjectId: ID!) {
                        minimizeComment(input: {subjectId: $subjectId, classifier: OUTDATED}) {
                          minimizedComment {
                            isMinimized
                          }
                        }
                      }
                    `,
                    { subjectId: comment.id },
                  );
                } catch (error) {
                  core.warning(
                    `Could not mark previous config diff comment ${comment.url} as outdated: ${error.message}`,
                  );
                }
              }
            };

            const isDailyFlakeInputUpdatePullRequest = async () => {
              if (pull.data.head.ref !== "ci/flake-update") {
                return false;
              }

              if (pull.data.title !== "flake: update inputs") {
                return false;
              }

              const body = pull.data.body || "";
              if (
                !body.includes("Automated update of flake inputs.") ||
                !body.includes("Trigger: schedule")
              ) {
                return false;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              const changedPaths = files.map((file) => file.filename).sort();
              return changedPaths.length === 1 && changedPaths[0] === "flake.lock";
            };

            const enableAutoMerge = async () => {
              if (!shouldAutoMerge) {
                if (packageChangeEntries.length > 0) {
                  core.notice("Skipping auto-merge because major config diff changes were detected.");
                } else {
                  core.notice("Skipping auto-merge because no config diff-capable targets were selected.");
                }
                return;
              }

              let dailyFlakeInputUpdate = false;
              try {
                dailyFlakeInputUpdate = await isDailyFlakeInputUpdatePullRequest();
              } catch (error) {
                core.warning(`Could not identify daily flake update pull request: ${error.message}`);
                return;
              }
              if (!dailyFlakeInputUpdate) {
                core.notice("Skipping auto-merge because this is not a scheduled flake input update PR.");
                return;
              }

              if (pull.data.draft) {
                core.notice("Skipping auto-merge because the pull request is a draft.");
                return;
              }

              if (pull.data.state !== "open") {
                core.notice(`Skipping auto-merge because the pull request is ${pull.data.state}.`);
                return;
              }

              try {
                await github.graphql(
                  `
                    mutation($pullRequestId: ID!) {
                      enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId}) {
                        pullRequest {
                          number
                          autoMergeRequest {
                            enabledAt
                          }
                        }
                      }
                    }
                  `,
                  { pullRequestId: pull.data.node_id },
                );
                core.notice("Enabled auto-merge because no major config diff changes were detected.");
              } catch (error) {
                core.warning(`Could not enable auto-merge: ${error.message}`);
              }
            };

            const truncateBlock = (block, limit) => {
              if (block.length <= limit) {
                return block;
              }

              const summary = block.match(/<summary>([^<]*)<\/summary>/)?.[1] || "diff";
              const fenceStart = block.indexOf("```text\n");
              const fenceEnd = block.lastIndexOf("\n```");
              const content =
                fenceStart >= 0 && fenceEnd > fenceStart
                  ? block.slice(fenceStart + "```text\n".length, fenceEnd)
                  : block;
              const detailsOpen = block.startsWith("<details open>") ? " open" : "";
              const prefix = `<details${detailsOpen}>\n<summary>${summary}</summary>\n\n\`\`\`text\n`;
              const suffix =
                "\n\n[truncated; full output is available in the workflow artifacts.]\n```\n\n</details>";

              if (prefix.length + suffix.length >= limit) {
                return `[diff output for ${summary} truncated; see workflow artifacts]`.slice(
                  0,
                  limit,
                );
              }

              return `${prefix}${content.slice(0, limit - prefix.length - suffix.length)}${suffix}`;
            };

            const chunks = [""];
            const appendBlock = (block) => {
              const normalized = truncateBlock(block, chunkLength);
              const current = chunks[chunks.length - 1];

              if (!current) {
                chunks[chunks.length - 1] = normalized;
                return;
              }

              if (current.length + 2 + normalized.length <= chunkLength) {
                chunks[chunks.length - 1] = `${current}\n\n${normalized}`;
                return;
              }

              chunks.push(normalized);
            };

            appendBlock("### Major changes");
            if (packageChangeEntries.length > 0) {
              for (const entry of packageChangeEntries) {
                appendBlock(entry);
              }
            } else if (expectedDiffEntries.length > 0) {
              appendBlock("_None._");
            } else {
              appendBlock("_No selected build target has config diff support._");
            }

            appendBlock("### Minor changes");
            if (sizeOnlyEntries.length > 0) {
              for (const entry of sizeOnlyEntries) {
                appendBlock(entry);
              }
            } else {
              appendBlock("_None._");
            }

            appendBlock("### No changes");
            if (unchangedEntries.length > 0) {
              appendBlock(
                unchangedEntries.map((entry) => `- ${entry}`).join("\n"),
              );
            } else {
              appendBlock("_None._");
            }

            const rawChunks = chunks.filter(Boolean);
            const omittedChunks = Math.max(0, rawChunks.length - maxComments);
            const visibleChunks = rawChunks.slice(0, maxComments);
            if (omittedChunks > 0) {
              visibleChunks[maxComments - 1] = [
                visibleChunks[maxComments - 1],
                "",
                `[${omittedChunks} additional comment part(s) omitted; full output is available in the workflow artifacts.]`,
              ].join("\n");
            }

            const bodies = visibleChunks.map((chunk, index) => {
              const part =
                rawChunks.length > 1
                  ? ` (part ${index + 1}/${Math.min(rawChunks.length, maxComments)})`
                  : "";
              const header = [
                commentMarker,
                `## Config diffs${part}`,
                "",
                `Base: \`${baseSha}\``,
                `Head: \`${headSha}\``,
                `PR head: \`${prHeadSha}\``,
                `Run: ${runUrl}`,
                "",
                commentSignature,
                "",
              ].join("\n");
              const body = `${header}${chunk}`;

              if (body.length > maxCommentLength) {
                return `${body.slice(
                  0,
                  maxCommentLength - 100,
                )}\n\n[truncated; full output is available in the workflow artifacts.]`;
              }

              return body;
            });

            await markPreviousConfigDiffCommentsObsolete();

            for (const body of bodies) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

            await enableAutoMerge();

  ci-success:
    name: CI (all jobs)
    if: ${{ always() }}
    needs:
      - plan-build-matrix
      - format
      - get-hosts-check
      - build
      - post-config-diffs
    runs-on: ubuntu-slim
    steps:
      - name: Check job results
        run: |
          set -euo pipefail

          if [ "${{ needs.plan-build-matrix.result }}" != "success" ] || [ "${{ needs.format.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "plan-build-matrix=${{ needs.plan-build-matrix.result }}"
            echo "format=${{ needs.format.result }}"
            exit 1
          fi

          if [ "${{ needs.plan-build-matrix.outputs.docs_only }}" = "true" ]; then
            echo "Docs-only change detected; skipped get-hosts-check and build."
            echo "All CI jobs passed."
            exit 0
          fi

          if [ "${{ needs.get-hosts-check.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            echo "get-hosts-check=${{ needs.get-hosts-check.result }}"
            echo "build=${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
