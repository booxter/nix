name: Checks

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read

jobs:
  check:
    name: Regular checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run regular checks
        run: make check

  plan-nixos-tests:
    name: plan NixOS tests
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_tests: ${{ steps.plan.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute NixOS test matrix
        id: plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const planner = require("./.github/scripts/plan-ci-matrix.js");
            const fullMatrix = {
              include: [
                { name: "NixOS test: cache", cmd: "nix build .#nixosTests.x86_64-linux.cache -L --show-trace" }
              ]
            };
            const hostTestMap = [
              { host: "prox-cachevm", tests: [ "NixOS test: cache" ] }
            ];
            const machinePathMap = [
              { prefix: "nixos/cachevm/", tests: [ "NixOS test: cache" ] },
              { prefix: "tests/nixos/cache.nix", tests: [ "NixOS test: cache" ] },
              { prefix: "tests/nixos/fixtures/atticd.env", tests: [ "NixOS test: cache" ] },
              ...hostTestMap.flatMap(({ host, tests }) => ([
                { prefix: `secrets/${host}.yaml`, tests },
                { prefix: `secrets/_templates/${host}.yaml`, tests },
              ])),
            ];

            if (context.eventName !== "pull_request") {
              core.info("Non-PR event, using full NixOS test matrix.");
              core.setOutput("matrix", JSON.stringify(fullMatrix));
              core.setOutput("has_tests", "true");
              return;
            }

            const result = await planner.planMatrix({
              context,
              github,
              eventName: context.eventName,
              fullMatrix,
              machinePathMap,
              mappingField: "tests",
              skipWhenDocsOnly: true,
              skipWhenSelectionEmpty: true,
              skipWhenOnlyDarwin: true,
            });
            core.info(`Changed files (${result.paths.length}): ${result.paths.join(", ")}`);
            core.info(`Selection files (${result.selectionPaths.length}): ${result.selectionPaths.join(", ")}`);
            const isHostSpecificMachinePath = (filePath) => {
              const parts = filePath.split("/");
              if (parts.length >= 3 && parts[0] === "nixos" && !parts[1].startsWith("_")) {
                return true;
              }
              if (parts.length === 2 && parts[0] === "secrets" && parts[1] !== "_template.yaml") {
                return true;
              }
              return parts.length === 3 && parts[0] === "secrets" && parts[1] === "_templates";
            };
            const hasMappedPath = result.selectionPaths.some((filePath) =>
              machinePathMap.some((entry) => filePath.startsWith(entry.prefix))
            );
            const onlyUnmappedHostSpecificMachinePaths =
              !hasMappedPath &&
              result.selectionPaths.length > 0 &&
              result.selectionPaths.every((filePath) =>
                !machinePathMap.some((entry) => filePath.startsWith(entry.prefix)) &&
                isHostSpecificMachinePath(filePath)
              );
            if (result.docsOnly) {
              core.info("Docs-only pull request detected, skipping NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }
            if (result.ignoredOnly) {
              core.info("Only selection-neutral files changed, skipping NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }
            if (onlyUnmappedHostSpecificMachinePaths) {
              core.info("Only non-cache host-specific machine paths changed, skipping cache NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }
            if (result.scopeReason === "darwin" && result.matrix.include.length === 0) {
              core.info("Darwin-only pull request detected, skipping NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }
            core.info(
              result.machineSpecific
                ? `Using machine-specific NixOS test matrix with ${result.matrix.include.length} job(s).`
                : `Using full NixOS test matrix with ${result.matrix.include.length} job(s).`
            );

            core.setOutput("matrix", JSON.stringify(result.matrix));
            core.setOutput("has_tests", result.matrix.include.length > 0 ? "true" : "false");

  check-nixos:
    if: needs.plan-nixos-tests.outputs.has_tests == 'true'
    needs:
      - plan-nixos-tests
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-nixos-tests.outputs.matrix) }}
    timeout-minutes: 180
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run NixOS tests
        run: ${{ matrix.cmd }}
