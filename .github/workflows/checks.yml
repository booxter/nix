name: Checks

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  pull-requests: read

jobs:
  check:
    name: Regular checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run regular checks
        run: make check

  plan-nixos-tests:
    name: plan NixOS tests
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_tests: ${{ steps.plan.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute NixOS test matrix
        id: plan
        uses: actions/github-script@v8
        with:
          script: |
            const planner = require("./.github/scripts/plan-ci-matrix.js");
            const fullMatrix = {
              include: [
                { name: "NixOS test: cache", cmd: "nix build .#nixosTests.x86_64-linux.cache -L --show-trace" }
              ]
            };

            if (context.eventName !== "pull_request") {
              core.info("Non-PR event, using full NixOS test matrix.");
              core.setOutput("matrix", JSON.stringify(fullMatrix));
              core.setOutput("has_tests", "true");
              return;
            }

            const paths = await planner.getChangedPaths({ context, github });
            core.info(`Changed files (${paths.length}): ${paths.join(", ")}`);
            const nonDocPaths = planner.filterNonDocPaths(paths);
            const selectionPaths = nonDocPaths.filter((p) => p !== "eslint.config.js");
            core.info(`Selection files (${selectionPaths.length}): ${selectionPaths.join(", ")}`);

            const docsOnly = planner.isDocsOnly(paths);
            if (docsOnly) {
              core.info("Docs-only pull request detected, skipping NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }

            const onlyDarwinPaths = planner.isOnlyUnder(selectionPaths, "darwin/");
            if (onlyDarwinPaths) {
              core.info("Darwin-only pull request detected, skipping NixOS tests.");
              core.setOutput("matrix", JSON.stringify({ include: [] }));
              core.setOutput("has_tests", "false");
              return;
            }

            const machinePathMap = [
              { prefix: "nixos/cachevm/", tests: [ "NixOS test: cache" ] },
              { prefix: "tests/nixos/cache.nix", tests: [ "NixOS test: cache" ] },
              { prefix: "tests/nixos/fixtures/atticd.env", tests: [ "NixOS test: cache" ] }
            ];

            const selection = planner.selectMachineSpecific({
              paths: selectionPaths,
              include: fullMatrix.include,
              mapping: machinePathMap,
              field: "tests",
            });
            const matrix = { include: selection.include };
            core.info(
              selection.machineSpecific
                ? `Using machine-specific NixOS test matrix with ${matrix.include.length} job(s).`
                : `Using full NixOS test matrix with ${matrix.include.length} job(s).`
            );

            core.setOutput("matrix", JSON.stringify(matrix));
            core.setOutput("has_tests", matrix.include.length > 0 ? "true" : "false");

  check-nixos:
    if: needs.plan-nixos-tests.outputs.has_tests == 'true'
    needs:
      - plan-nixos-tests
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-nixos-tests.outputs.matrix) }}
    timeout-minutes: 180
    env:
      NIX_CONFIG: system-features = benchmark big-parallel kvm nixos-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Run NixOS tests
        run: ${{ matrix.cmd }}
