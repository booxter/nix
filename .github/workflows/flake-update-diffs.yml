name: Flake update diffs

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - master
    paths:
      - flake.lock

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  plan-diff-matrix:
    name: plan diff matrix
    if: >-
      ${{
        github.event.pull_request.head.ref == 'ci/flake-update' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute diff matrix
        id: plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const targetInventory = require("./.github/scripts/ci-target-inventory.js");
            const targets = targetInventory.toDiffMatrixEntries(targetInventory.inventory.buildTargets);

            core.info(`Planned config diffs for ${targets.length} machine(s).`);
            core.setOutput("matrix", JSON.stringify({ include: targets }));
            core.setOutput("has_targets", targets.length > 0 ? "true" : "false");

  diff:
    name: diff ${{ matrix.name }}
    needs:
      - plan-diff-matrix
    if: needs.plan-diff-matrix.outputs.has_targets == 'true'
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-diff-matrix.outputs.matrix) }}
    timeout-minutes: 180
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: ./.github/actions/free-disk-space

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Generate diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MACHINE: ${{ matrix.machine }}
          MACHINE_NAME: ${{ matrix.name }}
          ORDER: ${{ matrix.order }}
        run: |
          set -euo pipefail

          mkdir -p diff-output
          safe_machine="$(
            printf '%s' "${MACHINE}" \
              | tr -c 'A-Za-z0-9._-' '-'
          )"
          changed_file="diff-output/changed-${ORDER}-${safe_machine}.md"
          unchanged_file="diff-output/unchanged-${ORDER}-${safe_machine}.txt"
          stdout_file="$(mktemp)"
          stderr_file="$(mktemp)"

          is_noop_diff() {
            local file="$1"

            if [ ! -s "${file}" ]; then
              return 0
            fi

            awk '
              NF {
                line = $0
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                lines[++n] = line
              }
              END {
                if (n != 2) {
                  exit 1
                }
                if (lines[1] !~ /^SIZE: / || lines[2] != "DIFF: 0 bytes") {
                  exit 1
                }

                size = lines[1]
                sub(/^SIZE: /, "", size)
                count = split(size, parts, / -> /)
                if (count != 2 || parts[1] != parts[2]) {
                  exit 1
                }
              }
            ' "${file}"
          }

          set +e
          nix run .#diff -- "${MACHINE}" "${BASE_SHA}" "${HEAD_SHA}" >"${stdout_file}" 2>"${stderr_file}"
          status="$?"
          set -e

          if [ "${status}" -eq 0 ] && is_noop_diff "${stdout_file}"; then
            printf '%s\n' "${MACHINE_NAME}" >"${unchanged_file}"
            exit 0
          fi

          {
            printf '<details>\n'
            printf '<summary>%s</summary>\n\n' "${MACHINE_NAME}"
            printf '```text\n'
            if [ "${status}" -ne 0 ]; then
              printf 'diff generation failed with exit code %s\n\n' "${status}"
              if [ -s "${stderr_file}" ]; then
                printf 'stderr:\n'
                cat "${stderr_file}"
                printf '\n'
              fi
              if [ -s "${stdout_file}" ]; then
                printf 'stdout:\n'
                cat "${stdout_file}"
                printf '\n'
              fi
            else
              cat "${stdout_file}"
            fi
            printf '```\n\n'
            printf '</details>\n'
          } >"${changed_file}"

      - name: Upload diff artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flake-diff-${{ matrix.order }}-${{ matrix.machine }}
          path: diff-output/*
          if-no-files-found: warn

  post-pr-comment:
    name: post PR comment
    needs:
      - plan-diff-matrix
      - diff
    if: >-
      ${{
        always() &&
        needs.plan-diff-matrix.result == 'success' &&
        needs.plan-diff-matrix.outputs.has_targets == 'true'
      }}
    runs-on: ubuntu-slim
    continue-on-error: true
    steps:
      - name: Download diff artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: flake-diff-*
          path: diff-output
          merge-multiple: true

      - name: Post PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const diffDir = "diff-output";

            let diffEntries = [];
            let unchangedEntries = [];
            if (fs.existsSync(diffDir)) {
              const files = fs.readdirSync(diffDir).sort();
              diffEntries = files
                .filter((name) => name.endsWith(".md"))
                .map((name) =>
                  fs.readFileSync(path.join(diffDir, name), "utf8").trim()
                )
                .filter(Boolean);
              unchangedEntries = files
                .filter((name) => name.endsWith(".txt"))
                .flatMap((name) =>
                  fs
                    .readFileSync(path.join(diffDir, name), "utf8")
                    .split(/\r?\n/)
                    .map((line) => line.trim())
                    .filter(Boolean)
                );
            }

            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const runUrl = process.env.RUN_URL;
            const maxCommentLength = 60000;
            const chunkLength = 59000;

            const truncateBlock = (block, limit) => {
              if (block.length <= limit) {
                return block;
              }

              const summary = block.match(/<summary>([^<]*)<\/summary>/)?.[1] || "diff";
              const fenceStart = block.indexOf("```text\n");
              const fenceEnd = block.lastIndexOf("\n```");
              const content =
                fenceStart >= 0 && fenceEnd > fenceStart
                  ? block.slice(fenceStart + "```text\n".length, fenceEnd)
                  : block;
              const prefix = `<details>\n<summary>${summary}</summary>\n\n\`\`\`text\n`;
              const suffix =
                "\n\n[truncated; full output is available in the workflow artifacts.]\n```\n\n</details>";

              if (prefix.length + suffix.length >= limit) {
                return `[diff output for ${summary} truncated; see workflow artifacts]`.slice(
                  0,
                  limit,
                );
              }

              return `${prefix}${content.slice(0, limit - prefix.length - suffix.length)}${suffix}`;
            };

            const chunks = [""];
            const appendBlock = (block) => {
              const normalized = truncateBlock(block, chunkLength);
              const current = chunks[chunks.length - 1];

              if (!current) {
                chunks[chunks.length - 1] = normalized;
                return;
              }

              if (current.length + 2 + normalized.length <= chunkLength) {
                chunks[chunks.length - 1] = `${current}\n\n${normalized}`;
                return;
              }

              chunks.push(normalized);
            };

            appendBlock("### Changed machines");
            if (diffEntries.length > 0) {
              for (const entry of diffEntries) {
                appendBlock(entry);
              }
            } else {
              appendBlock("_No machine produced package or closure-size changes._");
            }

            if (unchangedEntries.length > 0) {
              appendBlock(
                ["### Unchanged machines", "", ...unchangedEntries.map((entry) => `- ${entry}`)].join(
                  "\n",
                ),
              );
            }

            const { owner, repo } = context.repo;
            const bodies = chunks.filter(Boolean).map((chunk, index, allChunks) => {
              const part = allChunks.length > 1 ? ` (part ${index + 1}/${allChunks.length})` : "";
              const header = [
                `## Config diffs${part}`,
                "",
                `Base: \`${baseSha}\``,
                `Head: \`${headSha}\``,
                `Run: ${runUrl}`,
                "",
                "Advisory output from `nix run .#diff -- <machine> <base> <head>`.",
                "",
              ].join("\n");
              const body = `${header}${chunk}`;

              if (body.length > maxCommentLength) {
                return `${body.slice(
                  0,
                  maxCommentLength - 100,
                )}\n\n[truncated; full output is available in the workflow artifacts.]`;
              }

              return body;
            });

            for (const body of bodies) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
