name: Package updates

on:
  workflow_dispatch:
    inputs:
      target:
        description: Optional package attr from apps/package-updates/targets.json.
        required: false
        type: string
      oci_target:
        description: Optional OCI image target from oci/images.json.
        required: false
        type: string
  schedule:
    - cron: "30 7 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  plan:
    name: Plan update targets
    runs-on: ubuntu-latest
    outputs:
      package-targets: ${{ steps.plan.outputs.package-targets }}
      has-package-targets: ${{ steps.plan.outputs.has-package-targets }}
      oci-targets: ${{ steps.plan.outputs.oci-targets }}
      has-oci-targets: ${{ steps.plan.outputs.has-oci-targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Plan targets
        id: plan
        shell: bash
        env:
          TARGET: ${{ github.event.inputs.target || '' }}
          OCI_TARGET: ${{ github.event.inputs.oci_target || '' }}
        run: |
          set -euo pipefail

          run_packages=1
          run_oci_images=1
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${TARGET}" && -z "${OCI_TARGET}" ]]; then
              run_oci_images=0
            fi
            if [[ -z "${TARGET}" && -n "${OCI_TARGET}" ]]; then
              run_packages=0
            fi
          fi

          package_targets='[]'
          oci_targets='[]'

          if [[ "${run_packages}" -eq 1 ]]; then
            package_targets="$(
              jq -c --arg target "${TARGET}" '
                def branch_slug: gsub("[^A-Za-z0-9._-]"; "-");
                [
                  .targets[]
                  | select($target == "" or .attr == $target)
                  | {target: .attr, branch: (.attr | branch_slug)}
                ]
              ' apps/package-updates/targets.json
            )"
            if [[ "$(jq 'length' <<< "${package_targets}")" -eq 0 ]]; then
              echo "No package update targets matched: ${TARGET}" >&2
              exit 1
            fi
          fi

          if [[ "${run_oci_images}" -eq 1 ]]; then
            oci_targets="$(
              jq -c --arg target "${OCI_TARGET}" '
                def branch_slug: gsub("[^A-Za-z0-9._-]"; "-");
                [
                  to_entries[]
                  | select($target == "" or .key == $target)
                  | {target: .key, branch: (.key | branch_slug)}
                ]
              ' oci/images.json
            )"
            if [[ "$(jq 'length' <<< "${oci_targets}")" -eq 0 ]]; then
              echo "No OCI image targets matched: ${OCI_TARGET}" >&2
              exit 1
            fi
          fi

          {
            printf 'package-targets=%s\n' "${package_targets}"
            printf 'has-package-targets=%s\n' "$(jq -r 'length > 0' <<< "${package_targets}")"
            printf 'oci-targets=%s\n' "${oci_targets}"
            printf 'has-oci-targets=%s\n' "$(jq -r 'length > 0' <<< "${oci_targets}")"
          } >> "${GITHUB_OUTPUT}"

  update-packages:
    name: Package source (${{ matrix.target }})
    needs:
      - plan
    if: needs.plan.outputs.has-package-targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.package-targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Update package sources
        id: update_packages
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          summary_file="${RUNNER_TEMP}/package-update-pr-body.md"
          args=(--summary-file "${summary_file}")
          args+=(--target "${TARGET}")

          nix run .#update-packages -- "${args[@]}"

          {
            echo "body<<EOF"
            cat "${summary_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create package update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.CI_PR_TOKEN }}
          commit-message: "packages: update ${{ matrix.target }}"
          title: "packages: update ${{ matrix.target }}"
          body: ${{ steps.update_packages.outputs.body }}
          branch: ci/package-update-${{ matrix.branch }}
          delete-branch: true

  update-oci-images:
    name: OCI image tag (${{ matrix.target }})
    needs:
      - plan
    if: needs.plan.outputs.has-oci-targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.oci-targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Prepare Nix environment
        uses: ./.github/actions/prepare-nix-env

      - name: Update OCI image tags
        id: update_oci_images
        shell: bash
        env:
          OCI_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          summary_file="${RUNNER_TEMP}/oci-image-update-pr-body.md"
          args=(--summary-file "${summary_file}")
          args+=(--target "${OCI_TARGET}")

          nix run .#update-oci-images -- "${args[@]}"

          {
            echo "body<<EOF"
            cat "${summary_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create OCI image update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.CI_PR_TOKEN }}
          commit-message: "oci-images: update ${{ matrix.target }}"
          title: "oci-images: update ${{ matrix.target }}"
          body: ${{ steps.update_oci_images.outputs.body }}
          branch: ci/oci-image-update-${{ matrix.branch }}
          delete-branch: true
          add-paths: |
            oci/images.json
            oci/keys/*
