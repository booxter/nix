name: Prepare Nix environment
description: Checkout the repo, install Nix, and configure magic Nix cache.
runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v21
      with:
        extra-conf: |
          trusted-users = root runner
          allowed-users = root runner
          extra-substituters = https://cache.numtide.com https://nixos-raspberrypi.cachix.org https://cache.saumon.network/proxmox-nixos https://virby-nix-darwin.cachix.org
          extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI= proxmox-nixos:D9RYSWpQQC/msZUWphOY2I5RLH5Dd6yQcaHIuug7dWM= virby-nix-darwin.cachix.org-1:z9GiEZeBU5bEeoDQjyfHPMGPBaIQJOOvYOOjGMKIlLo=
        determinate: false

    - name: Setup magic Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@v13
      with:
        use-flakehub: false

    - name: Verify required binary caches are enabled
      shell: bash
      run: |
        set -euo pipefail

        required_substituters=(
          "https://cache.numtide.com"
          "https://nixos-raspberrypi.cachix.org"
          "https://cache.saumon.network/proxmox-nixos"
          "https://virby-nix-darwin.cachix.org"
        )
        required_public_keys=(
          "niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g="
          "nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI="
          "proxmox-nixos:D9RYSWpQQC/msZUWphOY2I5RLH5Dd6yQcaHIuug7dWM="
          "virby-nix-darwin.cachix.org-1:z9GiEZeBU5bEeoDQjyfHPMGPBaIQJOOvYOOjGMKIlLo="
        )

        substituters="$(nix config show substituters)"
        trusted_keys="$(nix config show trusted-public-keys)"

        for substituter in "${required_substituters[@]}"; do
          if ! grep -Fq "${substituter}" <<< "${substituters}"; then
            echo "Missing required substituter: ${substituter}"
            echo "Configured substituters: ${substituters}"
            exit 1
          fi
        done

        for key in "${required_public_keys[@]}"; do
          if ! grep -Fq "${key}" <<< "${trusted_keys}"; then
            echo "Missing required trusted key: ${key}"
            echo "Configured trusted-public-keys: ${trusted_keys}"
            exit 1
          fi
        done

    - name: Report Actions cache usage
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        set -euo pipefail
        gib_bytes="$((1024*1024*1024))"
        gh api -H "Accept: application/vnd.github+json" \
          "/repos/${GITHUB_REPOSITORY}/actions/cache/usage" \
          --jq "(.active_caches_size_in_bytes // 0) as \$active
            | (\$active * 100 / ${gib_bytes} | floor) as \$active_hundredths
            | \"Actions cache usage: \(\$active_hundredths / 100) GiB\""

    - name: Dump nix daemon config
      shell: bash
      run: |
        set -euo pipefail
        for conf in /etc/nix/*.conf; do
          [ -f "${conf}" ] || continue
          echo "----- ${conf} -----"
          cat "${conf}"
        done
