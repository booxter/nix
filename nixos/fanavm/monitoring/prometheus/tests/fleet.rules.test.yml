rule_files:
  - ../rules/fleet.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'node_cpu_seconds_total{instance="beast",job="node-mtls",cpu="0",mode="idle"}'
        values: "0+4.5x13"
    alert_rule_test:
      - eval_time: 5m
        alertname: NodeCpuUsageHigh
      - eval_time: 5m30s
        alertname: NodeCpuUsageHigh
        exp_alerts:
          - exp_labels:
              alertname: NodeCpuUsageHigh
              category: capacity
              instance: beast
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Node CPU usage high on beast"
              description: "beast CPU busy has been above 80% for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'node_cpu_seconds_total{instance="beast",job="node-mtls",cpu="0",mode="idle"}'
        values: "0+1.5x13"
    alert_rule_test:
      - eval_time: 5m
        alertname: NodeCpuUsageCritical
      - eval_time: 5m30s
        alertname: NodeCpuUsageCritical
        exp_alerts:
          - exp_labels:
              alertname: NodeCpuUsageCritical
              category: capacity
              instance: beast
              job: node-mtls
              severity: critical
            exp_annotations:
              summary: "Node CPU usage critical on beast"
              description: "beast CPU busy has been above 90% for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'node_memory_free_bytes{instance="mmini",job="node-mtls"}'
        values: "10x12"
      - series: 'node_memory_inactive_bytes{instance="mmini",job="node-mtls"}'
        values: "5x12"
      - series: 'node_memory_total_bytes{instance="mmini",job="node-mtls"}'
        values: "100x12"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: NodeMemoryUsageHigh
      - eval_time: 5m
        alertname: NodeMemoryUsageHigh
        exp_alerts:
          - exp_labels:
              alertname: NodeMemoryUsageHigh
              category: capacity
              instance: mmini
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Node memory usage high on mmini"
              description: "mmini memory usage has been above 80% for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'node_memory_MemAvailable_bytes{instance="beast",job="node-mtls"}'
        values: "5x12"
      - series: 'node_memory_MemTotal_bytes{instance="beast",job="node-mtls"}'
        values: "100x12"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: NodeMemoryUsageCritical
      - eval_time: 5m
        alertname: NodeMemoryUsageCritical
        exp_alerts:
          - exp_labels:
              alertname: NodeMemoryUsageCritical
              category: capacity
              instance: beast
              job: node-mtls
              severity: critical
            exp_annotations:
              summary: "Node memory usage critical on beast"
              description: "beast memory usage has been above 90% for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "20x62"
      - series: 'node_filesystem_size_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "100x62"
    alert_rule_test:
      - eval_time: 30m
        alertname: RootFilesystemUsageHigh

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "14x60 20x2"
      - series: 'node_filesystem_size_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "100x62"
    alert_rule_test:
      - eval_time: 29m30s
        alertname: RootFilesystemUsageHigh
      - eval_time: 30m
        alertname: RootFilesystemUsageHigh
        exp_alerts:
          - exp_labels:
              alertname: RootFilesystemUsageHigh
              category: capacity
              fstype: ext4
              instance: prox-builder2vm
              job: node-mtls
              mountpoint: /
              severity: warning
            exp_annotations:
              summary: "Root filesystem usage high on prox-builder2vm"
              description: "The root filesystem on prox-builder2vm has been above 85% used for 30 minutes."

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "6x32"
      - series: 'node_filesystem_size_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "100x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: RootFilesystemUsageCritical

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "4x30 6x2"
      - series: 'node_filesystem_size_bytes{instance="prox-builder2vm",job="node-mtls",mountpoint="/",fstype="ext4"}'
        values: "100x32"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: RootFilesystemUsageCritical
      - eval_time: 15m
        alertname: RootFilesystemUsageCritical
        exp_alerts:
          - exp_labels:
              alertname: RootFilesystemUsageCritical
              category: capacity
              fstype: ext4
              instance: prox-builder2vm
              job: node-mtls
              mountpoint: /
              severity: critical
            exp_annotations:
              summary: "Root filesystem usage critical on prox-builder2vm"
              description: "The root filesystem on prox-builder2vm has been above 95% used for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'node_nixos_upgrade_last_success_time_seconds{instance="beast",job="node-mtls"}'
        values: "86400x4322"
    alert_rule_test:
      - eval_time: 15d
        alertname: HostUpgradeStale

  - interval: 30s
    input_series:
      - series: 'node_nixos_upgrade_last_success_time_seconds{instance="beast",job="node-mtls"}'
        values: "0x46082"
    alert_rule_test:
      - eval_time: 15d
        alertname: HostUpgradeStale
      - eval_time: 15d30s
        alertname: HostUpgradeStale
        exp_alerts:
          - exp_labels:
              alertname: HostUpgradeStale
              category: maintenance
              instance: beast
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "NixOS upgrades stale on beast"
              description: "beast has not completed a successful NixOS upgrade for more than 14 days."

  - interval: 30s
    input_series:
      - series: 'node_nixos_upgrade_last_success_time_seconds{instance="beast",job="node-mtls"}'
        values: "0x46082"
      - series: 'node_nixos_upgrade_hold_active{instance="beast",job="node-mtls"}'
        values: "1x46082"
    alert_rule_test:
      - eval_time: 15d30s
        alertname: HostUpgradeStale
