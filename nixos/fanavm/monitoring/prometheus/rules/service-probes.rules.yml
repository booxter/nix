groups:
  - name: service-probes
    interval: 30s
    rules:
      - alert: BlackboxARRScrapeDown
        expr: max by(job) (up{job="blackbox-arr"}) < 1
        for: 5m
        labels:
          severity: warning
          category: observability
        annotations:
          summary: "Public service probe scrape down"
          description: "Prometheus has been unable to scrape any blackbox-arr probe targets for 5 minutes."
      - alert: PublicServiceProbeDown
        expr: probe_success{job="blackbox-arr",scope="external"} < 1
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Public service probe down: {{ $labels.instance }}"
          description: "The external blackbox probe for {{ $labels.instance }} has been failing for 5 minutes."
