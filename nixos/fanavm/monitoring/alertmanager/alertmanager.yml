global:
  resolve_timeout: 5m

route:
  receiver: telegram-home
  group_by:
    - alertname
  group_wait: 5s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: telegram-home
    telegram_configs:
      - bot_token_file: /run/credentials/alertmanager.service/telegram-bot-token
        chat_id_file: /run/credentials/alertmanager.service/telegram-chat-id
        parse_mode: HTML
        send_resolved: true
