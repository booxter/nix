rule_files:
  - ../rules/backup.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'host_observability_backup_job_configured{job="node-mtls",instance="home",backup_job="home-assistant-native-backup",backup_title="Home Assistant Native Backup",phase="prep",unit="home-assistant-native-backup.service"}'
        values: "1x4322"
    alert_rule_test:
      - eval_time: 35h59m30s
        alertname: BackupJobNeverRan
      - eval_time: 36h
        alertname: BackupJobNeverRan
        exp_alerts:
          - exp_labels:
              alertname: BackupJobNeverRan
              backup_job: home-assistant-native-backup
              backup_title: Home Assistant Native Backup
              category: backup
              instance: home
              job: node-mtls
              phase: prep
              severity: warning
              unit: home-assistant-native-backup.service
            exp_annotations:
              summary: "Backup job has never run on home: Home Assistant Native Backup"
              description: "The configured prep backup job Home Assistant Native Backup on home has not emitted a completed run within 36 hours."

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_job_configured{job="node-mtls",instance="home",backup_job="restic-beast-local",backup_title="Restic To Beast",phase="local",unit="restic-backups-beast.service"}'
        values: "1x4322"
      - series: 'host_observability_backup_last_run_timestamp_seconds{job="node-mtls",instance="home",backup_job="restic-beast-local",backup_title="Restic To Beast",phase="local",unit="restic-backups-beast.service"}'
        values: "3600x4322"
    alert_rule_test:
      - eval_time: 36h
        alertname: BackupJobNeverRan

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_last_success{job="node-mtls",instance="srvarr",backup_job="seerr-backup",backup_title="Create a consistent Seerr SQLite backup artifact",phase="prep",unit="seerr-backup.service"}'
        values: "1x62"
    alert_rule_test:
      - eval_time: 30m
        alertname: BackupJobFailed

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_last_success{job="node-mtls",instance="srvarr",backup_job="seerr-backup",backup_title="Create a consistent Seerr SQLite backup artifact",phase="prep",unit="seerr-backup.service"}'
        values: "0x61"
    alert_rule_test:
      - eval_time: 29m30s
        alertname: BackupJobFailed
      - eval_time: 30m
        alertname: BackupJobFailed
        exp_alerts:
          - exp_labels:
              alertname: BackupJobFailed
              backup_job: seerr-backup
              backup_title: Create a consistent Seerr SQLite backup artifact
              category: backup
              instance: srvarr
              job: node-mtls
              phase: prep
              severity: warning
              unit: seerr-backup.service
            exp_annotations:
              summary: "Backup job failed on srvarr: Create a consistent Seerr SQLite backup artifact"
              description: "The most recent prep backup job Create a consistent Seerr SQLite backup artifact on srvarr failed and has not been followed by a successful run for 30 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_last_success_timestamp_seconds{job="node-mtls",instance="org",backup_job="restic-beast-local",backup_title="Restic To Beast",phase="local",unit="restic-backups-beast.service"}'
        values: "3600x4600"
    alert_rule_test:
      - eval_time: 36h30m
        alertname: BackupJobStale
      - eval_time: 38h
        alertname: BackupJobStale
        exp_alerts:
          - exp_labels:
              alertname: BackupJobStale
              backup_job: restic-beast-local
              backup_title: Restic To Beast
              category: backup
              instance: org
              job: node-mtls
              phase: local
              severity: warning
              unit: restic-backups-beast.service
            exp_annotations:
              summary: "Backup job stale on org: Restic To Beast"
              description: "The local backup job Restic To Beast on org has not completed a successful run for more than 36 hours."

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_last_success_timestamp_seconds{job="node-mtls",instance="beast",backup_job="srvarr-cloud-offload",backup_title="srvarr Cloud Offload",phase="cloud",unit="restic-srvarr-cloud-offload.service"}'
        values: "3600x7500"
    alert_rule_test:
      - eval_time: 60h30m
        alertname: BackupJobStaleCritical
      - eval_time: 62h
        alertname: BackupJobStaleCritical
        exp_alerts:
          - exp_labels:
              alertname: BackupJobStaleCritical
              backup_job: srvarr-cloud-offload
              backup_title: srvarr Cloud Offload
              category: backup
              instance: beast
              job: node-mtls
              phase: cloud
              severity: critical
              unit: restic-srvarr-cloud-offload.service
            exp_annotations:
              summary: "Backup job critically stale on beast: srvarr Cloud Offload"
              description: "The cloud backup job srvarr Cloud Offload on beast has not completed a successful run for more than 60 hours."

  - interval: 30s
    input_series:
      - series: 'host_observability_backup_last_success_timestamp_seconds{job="node-mtls",instance="srvarr",backup_job="seerr-backup",backup_title="Create a consistent Seerr SQLite backup artifact",phase="prep",unit="seerr-backup.service"}'
        values: "0x5000"
    alert_rule_test:
      - eval_time: 72h
        alertname: BackupJobStale
      - eval_time: 72h
        alertname: BackupJobStaleCritical

  - interval: 30s
    input_series:
      - series: 'host_observability_b2_bucket_total_size_bytes{job="node-mtls",instance="beast",bucket="ihar-restic-prod"}'
        values: "100000000000x122"
    alert_rule_test:
      - eval_time: 1h
        alertname: B2BackupStorageHigh

  - interval: 30s
    input_series:
      - series: 'host_observability_b2_bucket_total_size_bytes{job="node-mtls",instance="beast",bucket="ihar-restic-prod"}'
        values: "110000000000x122"
    alert_rule_test:
      - eval_time: 29m30s
        alertname: B2BackupStorageHigh
      - eval_time: 30m
        alertname: B2BackupStorageHigh
        exp_alerts:
          - exp_labels:
              alertname: B2BackupStorageHigh
              bucket: ihar-restic-prod
              category: backup
              instance: beast
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "B2 backup storage usage high on beast: ihar-restic-prod"
              description: "B2 bucket ihar-restic-prod on beast reports more than 100 GB of stored backup data."

  - interval: 30s
    input_series:
      - series: 'host_observability_b2_bucket_usage_last_success_timestamp_seconds{job="node-mtls",instance="beast",bucket="ihar-restic-prod"}'
        values: "3600x6200"
    alert_rule_test:
      - eval_time: 48h30m
        alertname: B2BackupUsageDataStale
      - eval_time: 50h
        alertname: B2BackupUsageDataStale
        exp_alerts:
          - exp_labels:
              alertname: B2BackupUsageDataStale
              bucket: ihar-restic-prod
              category: backup
              instance: beast
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "B2 backup usage data stale on beast: ihar-restic-prod"
              description: "B2 usage metrics for bucket ihar-restic-prod on beast have not been refreshed successfully for more than 48 hours."

  - interval: 30s
    input_series:
      - series: 'host_observability_b2_bucket_usage_last_success_timestamp_seconds{job="node-mtls",instance="beast",bucket="ihar-restic-prod"}'
        values: "0x6200"
    alert_rule_test:
      - eval_time: 72h
        alertname: B2BackupUsageDataStale
