rule_files:
  - ../rules/storage.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'smartctl_device_smart_status{instance="beast",device="sda"}'
        values: "1x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: BeastDiskSMARTHealthFailed

  - interval: 30s
    input_series:
      - series: 'smartctl_device_smart_status{instance="beast",device="sda"}'
        values: "0x30 1x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastDiskSMARTHealthFailed
      - eval_time: 15m
        alertname: BeastDiskSMARTHealthFailed
        exp_alerts:
          - exp_labels:
              alertname: BeastDiskSMARTHealthFailed
              category: storage
              device: sda
              instance: beast
              severity: critical
            exp_annotations:
              summary: "SMART health failed on beast: sda"
              description: "Drive sda on beast has reported SMART health failure for 15 minutes."
      - eval_time: 15m30s
        alertname: BeastDiskSMARTHealthFailed

  - interval: 30s
    input_series:
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Current_Pending_Sector",attribute_value_type="raw"}'
        values: "0x32"
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Offline_Uncorrectable",attribute_value_type="raw"}'
        values: "0x32"
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Reported_Uncorrect",attribute_value_type="raw"}'
        values: "0x32"
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Reallocated_Sector_Ct",attribute_value_type="raw"}'
        values: "20x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: BeastDiskPendingSectors
      - eval_time: 15m
        alertname: BeastDiskOfflineUncorrectable
      - eval_time: 15m
        alertname: BeastDiskReportedUncorrect
      - eval_time: 15m
        alertname: BeastDiskReallocatedSectorsHigh
      - eval_time: 15m
        alertname: BeastSMARTTelemetryMissingForDrive

  - interval: 30s
    input_series:
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Current_Pending_Sector",attribute_value_type="raw"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastDiskPendingSectors
      - eval_time: 15m
        alertname: BeastDiskPendingSectors
        exp_alerts:
          - exp_labels:
              alertname: BeastDiskPendingSectors
              attribute_name: Current_Pending_Sector
              attribute_value_type: raw
              category: storage
              device: sda
              instance: beast
              severity: critical
            exp_annotations:
              summary: "Pending sectors on beast: sda"
              description: "Drive sda on beast has reported current pending sectors for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Offline_Uncorrectable",attribute_value_type="raw"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastDiskOfflineUncorrectable
      - eval_time: 15m
        alertname: BeastDiskOfflineUncorrectable
        exp_alerts:
          - exp_labels:
              alertname: BeastDiskOfflineUncorrectable
              attribute_name: Offline_Uncorrectable
              attribute_value_type: raw
              category: storage
              device: sda
              instance: beast
              severity: critical
            exp_annotations:
              summary: "Offline uncorrectable sectors on beast: sda"
              description: "Drive sda on beast has reported offline uncorrectable sectors for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Reported_Uncorrect",attribute_value_type="raw"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastDiskReportedUncorrect
      - eval_time: 15m
        alertname: BeastDiskReportedUncorrect
        exp_alerts:
          - exp_labels:
              alertname: BeastDiskReportedUncorrect
              attribute_name: Reported_Uncorrect
              attribute_value_type: raw
              category: storage
              device: sda
              instance: beast
              severity: warning
            exp_annotations:
              summary: "Reported uncorrectable errors on beast: sda"
              description: "Drive sda on beast has reported uncorrectable read or write errors for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'smartctl_device_attribute{instance="beast",device="sda",attribute_name="Reallocated_Sector_Ct",attribute_value_type="raw"}'
        values: "31x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastDiskReallocatedSectorsHigh
      - eval_time: 15m
        alertname: BeastDiskReallocatedSectorsHigh
        exp_alerts:
          - exp_labels:
              alertname: BeastDiskReallocatedSectorsHigh
              attribute_name: Reallocated_Sector_Ct
              attribute_value_type: raw
              category: storage
              device: sda
              instance: beast
              severity: warning
            exp_annotations:
              summary: "Reallocated sectors high on beast: sda"
              description: "Drive sda on beast has reported more than 30 reallocated sectors for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_disk_bay_info{job="node-mtls",instance="beast",bay="3",device="sda"}'
        values: "1x32"
      - series: 'smartctl_device_smart_status{instance="beast",device="sda"}'
        values: "1x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: BeastSMARTTelemetryMissingForDrive

  - interval: 30s
    input_series:
      - series: 'host_observability_disk_bay_info{job="node-mtls",instance="beast",bay="3",device="sda"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastSMARTTelemetryMissingForDrive
      - eval_time: 15m
        alertname: BeastSMARTTelemetryMissingForDrive
        exp_alerts:
          - exp_labels:
              alertname: BeastSMARTTelemetryMissingForDrive
              bay: "3"
              category: storage
              device: sda
              instance: beast
              severity: warning
            exp_annotations:
              summary: "SMART telemetry missing on beast: bay 3"
              description: "The disk mapped to bay 3 on beast (sda) no longer has SMART telemetry even though the disk bay mapping is still present."

  - interval: 30s
    input_series:
      - series: 'host_observability_md_degraded{instance="beast",device="md127"}'
        values: "0x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: BeastRAIDDegraded
      - eval_time: 15m
        alertname: BeastRAIDBackgroundRecoveryActive

  - interval: 30s
    input_series:
      - series: 'host_observability_md_degraded{instance="beast",device="md127"}'
        values: "1x10 0x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: BeastRAIDDegraded
      - eval_time: 5m
        alertname: BeastRAIDDegraded
        exp_alerts:
          - exp_labels:
              alertname: BeastRAIDDegraded
              category: storage
              device: md127
              instance: beast
              severity: critical
            exp_annotations:
              summary: "Beast RAID degraded: md127"
              description: "The md array md127 on beast has reported degraded members for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_md_sync_active{instance="beast",device="md127",action="check"}'
        values: "1x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: BeastRAIDBackgroundRecoveryActive

  - interval: 30s
    input_series:
      - series: 'host_observability_md_sync_active{instance="beast",device="md127",action="resync"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastRAIDBackgroundRecoveryActive
      - eval_time: 15m
        alertname: BeastRAIDBackgroundRecoveryActive
        exp_alerts:
          - exp_labels:
              action: resync
              alertname: BeastRAIDBackgroundRecoveryActive
              category: storage
              device: md127
              instance: beast
              severity: warning
            exp_annotations:
              summary: "Beast RAID background work active: md127 / resync"
              description: "The md array md127 on beast has had resync background work active for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "15x62"
      - series: 'node_filesystem_size_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "100x62"
    alert_rule_test:
      - eval_time: 30m
        alertname: BeastVolume2UsageHigh
      - eval_time: 15m
        alertname: BeastVolume2UsageCritical

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "9x60 15x2"
      - series: 'node_filesystem_size_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "100x62"
    alert_rule_test:
      - eval_time: 29m30s
        alertname: BeastVolume2UsageHigh
      - eval_time: 30m
        alertname: BeastVolume2UsageHigh
        exp_alerts:
          - exp_labels:
              alertname: BeastVolume2UsageHigh
              category: storage
              device: /dev/md127
              fstype: btrfs
              instance: beast
              mountpoint: /volume2
              severity: warning
            exp_annotations:
              summary: "Beast volume2 usage high"
              description: "The /volume2 filesystem on beast has been above 90% used for 30 minutes."
      - eval_time: 30m30s
        alertname: BeastVolume2UsageHigh

  - interval: 30s
    input_series:
      - series: 'node_filesystem_avail_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "4x30 15x2"
      - series: 'node_filesystem_size_bytes{instance="beast",mountpoint="/volume2",fstype="btrfs",device="/dev/md127"}'
        values: "100x32"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: BeastVolume2UsageCritical
      - eval_time: 15m
        alertname: BeastVolume2UsageCritical
        exp_alerts:
          - exp_labels:
              alertname: BeastVolume2UsageCritical
              category: storage
              device: /dev/md127
              fstype: btrfs
              instance: beast
              mountpoint: /volume2
              severity: critical
            exp_annotations:
              summary: "Beast volume2 usage critically high"
              description: "The /volume2 filesystem on beast has been above 95% used for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'node_btrfs_device_errors_total{instance="beast",device="md127",type="write"}'
        values: "0x42"
    alert_rule_test:
      - eval_time: 20m
        alertname: BeastBtrfsDeviceErrors

  - interval: 30s
    input_series:
      - series: 'node_btrfs_device_errors_total{instance="beast",device="md127",type="write"}'
        values: "0x20 1x22"
    alert_rule_test:
      - eval_time: 15m
        alertname: BeastBtrfsDeviceErrors
      - eval_time: 15m30s
        alertname: BeastBtrfsDeviceErrors
        exp_alerts:
          - exp_labels:
              alertname: BeastBtrfsDeviceErrors
              category: storage
              device: md127
              instance: beast
              severity: warning
              type: write
            exp_annotations:
              summary: "Btrfs device errors on beast: write"
              description: "The write btrfs device error counter on md127 for beast increased within the last 15 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_degraded{instance="beast",controller="0"}'
        values: "0x22"
      - series: 'host_observability_hba_failed{instance="beast",controller="0"}'
        values: "0x12"
      - series: 'host_observability_hba_drive_visible{instance="beast",controller="0",bay="1",bay_row="0",bay_col="0",model="ST24000NM000H-3KS103",serial="ZYD01W48"}'
        values: "1x22"
      - series: 'host_observability_hba_memory_correctable_errors{instance="beast",controller="0"}'
        values: "0x22"
      - series: 'host_observability_hba_memory_uncorrectable_errors{instance="beast",controller="0"}'
        values: "0x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: BeastHBAControllerDegraded
      - eval_time: 5m
        alertname: BeastHBAControllerFailed
      - eval_time: 10m
        alertname: BeastHBADriveMissing
      - eval_time: 10m
        alertname: BeastHBAMemoryCorrectableErrors
      - eval_time: 10m
        alertname: BeastHBAMemoryUncorrectableErrors

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_degraded{instance="beast",controller="0"}'
        values: "1x20 0x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: BeastHBAControllerDegraded
      - eval_time: 10m
        alertname: BeastHBAControllerDegraded
        exp_alerts:
          - exp_labels:
              alertname: BeastHBAControllerDegraded
              category: storage
              controller: "0"
              instance: beast
              severity: warning
            exp_annotations:
              summary: "Beast HBA degraded: controller 0"
              description: "The Broadcom HBA controller 0 on beast has reported degraded state for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_failed{instance="beast",controller="0"}'
        values: "1x10 0x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: BeastHBAControllerFailed
      - eval_time: 5m
        alertname: BeastHBAControllerFailed
        exp_alerts:
          - exp_labels:
              alertname: BeastHBAControllerFailed
              category: storage
              controller: "0"
              instance: beast
              severity: critical
            exp_annotations:
              summary: "Beast HBA failed: controller 0"
              description: "The Broadcom HBA controller 0 on beast has reported failed state for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_drive_visible{instance="beast",controller="",bay="1",bay_row="0",bay_col="0",model="ST24000NM000H-3KS103",serial="ZYD01W48"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: BeastHBADriveMissing
      - eval_time: 10m
        alertname: BeastHBADriveMissing
        exp_alerts:
          - exp_labels:
              alertname: BeastHBADriveMissing
              bay: "1"
              bay_col: "0"
              bay_row: "0"
              category: storage
              instance: beast
              model: ST24000NM000H-3KS103
              serial: ZYD01W48
              severity: critical
            exp_annotations:
              summary: "Beast HBA drive missing: bay 1"
              description: "The expected drive in bay 1 on beast is no longer visible to the HBA. Serial: ZYD01W48. Model: ST24000NM000H-3KS103."

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_memory_correctable_errors{instance="beast",controller="0"}'
        values: "1x20 0x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: BeastHBAMemoryCorrectableErrors
      - eval_time: 10m
        alertname: BeastHBAMemoryCorrectableErrors
        exp_alerts:
          - exp_labels:
              alertname: BeastHBAMemoryCorrectableErrors
              category: storage
              controller: "0"
              instance: beast
              severity: warning
            exp_annotations:
              summary: "Beast HBA memory correctable errors: controller 0"
              description: "The Broadcom HBA controller 0 on beast has reported correctable memory errors for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_hba_memory_uncorrectable_errors{instance="beast",controller="0"}'
        values: "1x20 0x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: BeastHBAMemoryUncorrectableErrors
      - eval_time: 10m
        alertname: BeastHBAMemoryUncorrectableErrors
        exp_alerts:
          - exp_labels:
              alertname: BeastHBAMemoryUncorrectableErrors
              category: storage
              controller: "0"
              instance: beast
              severity: critical
            exp_annotations:
              summary: "Beast HBA memory uncorrectable errors: controller 0"
              description: "The Broadcom HBA controller 0 on beast has reported uncorrectable memory errors for 10 minutes."
