rule_files:
  - ../rules/custom-jobs.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'host_observability_transmission_exporter_ok{instance="srvarr"}'
        values: "1x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: TransmissionCollectorFailed

  - interval: 30s
    input_series:
      - series: 'host_observability_transmission_exporter_ok{instance="srvarr"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: TransmissionCollectorFailed
      - eval_time: 10m
        alertname: TransmissionCollectorFailed
        exp_alerts:
          - exp_labels:
              alertname: TransmissionCollectorFailed
              category: automation
              instance: srvarr
              severity: warning
            exp_annotations:
              summary: "Transmission collector failed on srvarr"
              description: "The Transmission metrics collector on srvarr has been reporting unsuccessful iterations for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_transmission_exporter_last_success_timestamp_seconds{instance="srvarr"}'
        values: "0x31"
    alert_rule_test:
      - eval_time: 15m
        alertname: TransmissionCollectorStale
      - eval_time: 15m30s
        alertname: TransmissionCollectorStale
        exp_alerts:
          - exp_labels:
              alertname: TransmissionCollectorStale
              category: automation
              instance: srvarr
              severity: warning
            exp_annotations:
              summary: "Transmission collector stale on srvarr"
              description: "The Transmission metrics collector on srvarr has not completed a successful iteration for more than 10 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_adaptive_upload_exporter_ok{instance="srvarr"}'
        values: "1x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: AdaptiveUploadPolicyExporterFailed

  - interval: 30s
    input_series:
      - series: 'host_observability_adaptive_upload_exporter_ok{instance="srvarr"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: AdaptiveUploadPolicyExporterFailed
      - eval_time: 10m
        alertname: AdaptiveUploadPolicyExporterFailed
        exp_alerts:
          - exp_labels:
              alertname: AdaptiveUploadPolicyExporterFailed
              category: automation
              instance: srvarr
              severity: warning
            exp_annotations:
              summary: "Adaptive upload controller exporter failed on srvarr"
              description: "The adaptive upload controller on srvarr has been unable to fetch Jellyfin exporter state successfully for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_textfile_mtime_seconds{instance="srvarr",file="/var/lib/prometheus-node-exporter-textfile/adaptive-upload-policy.prom"}'
        values: "0x31"
    alert_rule_test:
      - eval_time: 15m
        alertname: AdaptiveUploadPolicyMetricsStale
      - eval_time: 15m30s
        alertname: AdaptiveUploadPolicyMetricsStale
        exp_alerts:
          - exp_labels:
              alertname: AdaptiveUploadPolicyMetricsStale
              category: automation
              file: /var/lib/prometheus-node-exporter-textfile/adaptive-upload-policy.prom
              instance: srvarr
              severity: warning
            exp_annotations:
              summary: "Adaptive upload metrics stale on srvarr"
              description: "The adaptive upload controller metrics file on srvarr has not been refreshed for more than 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="srvarr",job="node-mtls",name="lidarr-cue-splitter.service",state="active"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: LidarrCueSplitterServiceDown
      - eval_time: 5m
        alertname: LidarrCueSplitterServiceDown
        exp_alerts:
          - exp_labels:
              alertname: LidarrCueSplitterServiceDown
              category: media
              instance: srvarr
              job: node-mtls
              name: lidarr-cue-splitter.service
              severity: warning
              state: active
            exp_annotations:
              summary: "Lidarr CUE splitter service down on srvarr"
              description: "The Lidarr CUE splitter service on srvarr has not been active for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="srvarr",job="node-mtls",name="podman-pinepods.service",state="active"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: PinePodsServiceDown
      - eval_time: 5m
        alertname: PinePodsServiceDown
        exp_alerts:
          - exp_labels:
              alertname: PinePodsServiceDown
              category: media
              instance: srvarr
              job: node-mtls
              name: podman-pinepods.service
              severity: warning
              state: active
            exp_annotations:
              summary: "PinePods service down on srvarr: podman-pinepods.service"
              description: "The PinePods application or one of its database/cache dependencies on srvarr has not been active for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_lidarr_cue_splitter_ok{instance="srvarr",job="node-mtls"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: LidarrCueSplitterIterationFailed
      - eval_time: 10m
        alertname: LidarrCueSplitterIterationFailed
        exp_alerts:
          - exp_labels:
              alertname: LidarrCueSplitterIterationFailed
              category: media
              instance: srvarr
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Lidarr CUE splitter failing on srvarr"
              description: "The Lidarr CUE splitter on srvarr has been reporting unsuccessful iterations for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_textfile_mtime_seconds{instance="srvarr",job="node-mtls",file="/var/lib/prometheus-node-exporter-textfile/lidarr-cue-splitter.prom"}'
        values: "0x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: LidarrCueSplitterMetricsStale
      - eval_time: 10m30s
        alertname: LidarrCueSplitterMetricsStale
        exp_alerts:
          - exp_labels:
              alertname: LidarrCueSplitterMetricsStale
              category: media
              file: /var/lib/prometheus-node-exporter-textfile/lidarr-cue-splitter.prom
              instance: srvarr
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Lidarr CUE splitter metrics stale on srvarr"
              description: "The Lidarr CUE splitter metrics file on srvarr has not been refreshed for more than 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_lidarr_cue_splitter_jobs{instance="srvarr",job="node-mtls",state="needs_attention"}'
        values: "1x30 0x2"
    alert_rule_test:
      - eval_time: 14m30s
        alertname: LidarrCueSplitterJobNeedsAttention
      - eval_time: 15m
        alertname: LidarrCueSplitterJobNeedsAttention
        exp_alerts:
          - exp_labels:
              alertname: LidarrCueSplitterJobNeedsAttention
              category: media
              instance: srvarr
              job: node-mtls
              severity: warning
              state: needs_attention
            exp_annotations:
              summary: "Lidarr CUE split job needs attention on srvarr"
              description: "At least one Lidarr CUE split job on srvarr has remained failed or in need of attention for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="open-webui-searxng-probe.timer",state="active"}'
        values: "1x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: OpenWebUISearxngProbeTimerDown

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="open-webui-searxng-probe.timer",state="active"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: OpenWebUISearxngProbeTimerDown
      - eval_time: 10m
        alertname: OpenWebUISearxngProbeTimerDown
        exp_alerts:
          - exp_labels:
              alertname: OpenWebUISearxngProbeTimerDown
              category: service
              instance: org
              job: node-mtls
              name: open-webui-searxng-probe.timer
              severity: warning
              state: active
            exp_annotations:
              summary: "Open WebUI SearXNG probe timer down on org"
              description: "The Open WebUI SearXNG dependency probe timer on org has not been active for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="open-webui-searxng-probe.service",state="failed"}'
        values: "0x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: OpenWebUISearxngProbeServiceFailed

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="open-webui-searxng-probe.service",state="failed"}'
        values: "1x10 0x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: OpenWebUISearxngProbeServiceFailed
      - eval_time: 5m
        alertname: OpenWebUISearxngProbeServiceFailed
        exp_alerts:
          - exp_labels:
              alertname: OpenWebUISearxngProbeServiceFailed
              category: service
              instance: org
              job: node-mtls
              name: open-webui-searxng-probe.service
              severity: warning
              state: failed
            exp_annotations:
              summary: "Open WebUI SearXNG probe service failed on org"
              description: "The Open WebUI SearXNG dependency probe service on org has remained in the failed state for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_openwebui_searxng_probe_ok{instance="org",job="node-mtls"}'
        values: "1x22"
    alert_rule_test:
      - eval_time: 10m
        alertname: OpenWebUISearxngProbeFailed

  - interval: 30s
    input_series:
      - series: 'host_observability_openwebui_searxng_probe_ok{instance="org",job="node-mtls"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: OpenWebUISearxngProbeFailed
      - eval_time: 10m
        alertname: OpenWebUISearxngProbeFailed
        exp_alerts:
          - exp_labels:
              alertname: OpenWebUISearxngProbeFailed
              category: service
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Open WebUI SearXNG probe failed on org"
              description: "The Open WebUI SearXNG dependency probe on org has been failing for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_textfile_mtime_seconds{instance="org",job="node-mtls",file="/var/lib/prometheus-node-exporter-textfile/open-webui-searxng.prom"}'
        values: "0x42"
    alert_rule_test:
      - eval_time: 20m
        alertname: OpenWebUISearxngProbeStale
      - eval_time: 20m30s
        alertname: OpenWebUISearxngProbeStale
        exp_alerts:
          - exp_labels:
              alertname: OpenWebUISearxngProbeStale
              category: service
              file: /var/lib/prometheus-node-exporter-textfile/open-webui-searxng.prom
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Open WebUI SearXNG probe stale on org"
              description: "The Open WebUI SearXNG dependency probe metrics file on org has not been refreshed for more than 15 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_openwebui_searxng_probe_results{instance="org",job="node-mtls"}'
        values: "5x62"
    alert_rule_test:
      - eval_time: 30m
        alertname: OpenWebUISearxngProbeNoResults

  - interval: 30s
    input_series:
      - series: 'host_observability_openwebui_searxng_probe_results{instance="org",job="node-mtls"}'
        values: "0x60 5x2"
    alert_rule_test:
      - eval_time: 29m30s
        alertname: OpenWebUISearxngProbeNoResults
      - eval_time: 30m
        alertname: OpenWebUISearxngProbeNoResults
        exp_alerts:
          - exp_labels:
              alertname: OpenWebUISearxngProbeNoResults
              category: service
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Open WebUI SearXNG probe returned no results on org"
              description: "The Open WebUI SearXNG dependency probe on org has returned zero search results for 30 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="searx.service",state="active"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: SearxngServiceDown
      - eval_time: 10m
        alertname: SearxngServiceDown
        exp_alerts:
          - exp_labels:
              alertname: SearxngServiceDown
              category: service
              instance: org
              job: node-mtls
              name: searx.service
              severity: warning
              state: active
            exp_annotations:
              summary: "SearXNG service down on org"
              description: "The SearXNG systemd service on org has not been active for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="oauth2-proxy-search.service",state="active"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: SearxngOauth2ProxyDown
      - eval_time: 10m
        alertname: SearxngOauth2ProxyDown
        exp_alerts:
          - exp_labels:
              alertname: SearxngOauth2ProxyDown
              category: service
              instance: org
              job: node-mtls
              name: oauth2-proxy-search.service
              severity: warning
              state: active
            exp_annotations:
              summary: "SearXNG OAuth proxy down on org"
              description: "The oauth2-proxy service protecting SearXNG on org has not been active for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="pki",job="node-mtls",name="kanidm-oidc-synthetic-probe.timer",state="active"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: OidcSyntheticProbeTimerDown
      - eval_time: 10m
        alertname: OidcSyntheticProbeTimerDown
        exp_alerts:
          - exp_labels:
              alertname: OidcSyntheticProbeTimerDown
              category: service
              instance: pki
              job: node-mtls
              name: kanidm-oidc-synthetic-probe.timer
              severity: warning
              state: active
            exp_annotations:
              summary: "OIDC synthetic probe timer down on pki"
              description: "The OIDC synthetic probe timer on pki has not been active for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="pki",job="node-mtls",name="kanidm-oidc-synthetic-probe.service",state="failed"}'
        values: "1x10 0x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: OidcSyntheticProbeServiceFailed
      - eval_time: 5m
        alertname: OidcSyntheticProbeServiceFailed
        exp_alerts:
          - exp_labels:
              alertname: OidcSyntheticProbeServiceFailed
              category: service
              instance: pki
              job: node-mtls
              name: kanidm-oidc-synthetic-probe.service
              severity: warning
              state: failed
            exp_annotations:
              summary: "OIDC synthetic probe service failed on pki"
              description: "The OIDC synthetic probe bootstrap or runner service on pki has remained in the failed state for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'host_observability_oidc_synthetic_probe_ok{instance="pki",job="node-mtls",probe="kanidm"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: OidcSyntheticProbeFailed
      - eval_time: 10m
        alertname: OidcSyntheticProbeFailed
        exp_alerts:
          - exp_labels:
              alertname: OidcSyntheticProbeFailed
              category: service
              instance: pki
              job: node-mtls
              probe: kanidm
              severity: warning
            exp_annotations:
              summary: "OIDC synthetic probe failed: kanidm"
              description: "The OIDC synthetic probe 'kanidm' on pki has been failing for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_textfile_mtime_seconds{instance="pki",job="node-mtls",file="/var/lib/prometheus-node-exporter-textfile/oidc-synthetic.prom"}'
        values: "0x42"
    alert_rule_test:
      - eval_time: 20m
        alertname: OidcSyntheticProbeMetricsStale
      - eval_time: 20m30s
        alertname: OidcSyntheticProbeMetricsStale
        exp_alerts:
          - exp_labels:
              alertname: OidcSyntheticProbeMetricsStale
              category: service
              file: /var/lib/prometheus-node-exporter-textfile/oidc-synthetic.prom
              instance: pki
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "OIDC synthetic probe metrics stale on pki"
              description: "The OIDC synthetic probe metrics file on pki has not been refreshed for more than 15 minutes."

  - interval: 30s
    input_series:
      - series: 'paperless_status_database_status{instance="org",job="paperless"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: PaperlessComponentUnhealthy
      - eval_time: 10m
        alertname: PaperlessComponentUnhealthy
        exp_alerts:
          - exp_labels:
              alertname: PaperlessComponentUnhealthy
              category: service
              component: database
              instance: org
              job: paperless
              severity: warning
            exp_annotations:
              summary: "Paperless component unhealthy: database on org"
              description: "Paperless has reported the database component unhealthy for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="searchless-ngx-metrics.timer",state="active"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: SearchlessMetricsTimerDown
      - eval_time: 10m
        alertname: SearchlessMetricsTimerDown
        exp_alerts:
          - exp_labels:
              alertname: SearchlessMetricsTimerDown
              category: service
              instance: org
              job: node-mtls
              name: searchless-ngx-metrics.timer
              severity: warning
              state: active
            exp_annotations:
              summary: "Searchless metrics timer down on org"
              description: "The Searchless API metrics timer on org has not been active for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{instance="org",job="node-mtls",name="searchless-ngx-metrics.service",state="failed"}'
        values: "1x10 0x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: SearchlessMetricsServiceFailed
      - eval_time: 5m
        alertname: SearchlessMetricsServiceFailed
        exp_alerts:
          - exp_labels:
              alertname: SearchlessMetricsServiceFailed
              category: service
              instance: org
              job: node-mtls
              name: searchless-ngx-metrics.service
              severity: warning
              state: failed
            exp_annotations:
              summary: "Searchless metrics service failed on org"
              description: "The Searchless API metrics service on org has remained in the failed state for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'searchless_metrics_collection_success{instance="org",job="node-mtls"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: SearchlessMetricsCollectionFailed
      - eval_time: 10m
        alertname: SearchlessMetricsCollectionFailed
        exp_alerts:
          - exp_labels:
              alertname: SearchlessMetricsCollectionFailed
              category: service
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Searchless metrics collection failed on org"
              description: "The Searchless API metrics collector on org has been failing for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'searchless_vector_store_initialized{instance="org",job="node-mtls"}'
        values: "0x20 1x2"
    alert_rule_test:
      - eval_time: 9m30s
        alertname: SearchlessComponentUnhealthy
      - eval_time: 10m
        alertname: SearchlessComponentUnhealthy
        exp_alerts:
          - exp_labels:
              alertname: SearchlessComponentUnhealthy
              category: service
              component: vector store
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Searchless component unhealthy: vector store on org"
              description: "Searchless has reported the vector store component unhealthy for 10 minutes."

  - interval: 30s
    input_series:
      - series: 'node_textfile_mtime_seconds{instance="org",job="node-mtls",file="/var/lib/prometheus-node-exporter-textfile/searchless-ngx.prom"}'
        values: "0x24"
    alert_rule_test:
      - eval_time: 10m
        alertname: SearchlessMetricsStale
      - eval_time: 10m30s
        alertname: SearchlessMetricsStale
        exp_alerts:
          - exp_labels:
              alertname: SearchlessMetricsStale
              category: service
              file: /var/lib/prometheus-node-exporter-textfile/searchless-ngx.prom
              instance: org
              job: node-mtls
              severity: warning
            exp_annotations:
              summary: "Searchless metrics stale on org"
              description: "The Searchless API metrics file on org has not been refreshed for more than 5 minutes."
