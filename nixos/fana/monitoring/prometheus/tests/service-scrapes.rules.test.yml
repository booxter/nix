rule_files:
  - ../rules/service-scrapes.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'up{job="home-assistant",instance="home"}'
        values: "0x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: ApplicationMetricsScrapeDown
        exp_alerts:
          - exp_labels:
              alertname: ApplicationMetricsScrapeDown
              category: service
              instance: home
              job: home-assistant
              severity: warning
            exp_annotations:
              summary: "Application metrics scrape down: home-assistant on home"
              description: "Prometheus has been unable to scrape the home-assistant metrics endpoint on home for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'up{job="jellyfin",instance="beast"}'
        values: "1x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: ApplicationMetricsScrapeDown

  - interval: 30s
    input_series:
      - series: 'up{job="lolek",instance="beast"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: ApplicationMetricsScrapeDown
      - eval_time: 5m
        alertname: ApplicationMetricsScrapeDown
        exp_alerts:
          - exp_labels:
              alertname: ApplicationMetricsScrapeDown
              category: service
              instance: beast
              job: lolek
              severity: warning
            exp_annotations:
              summary: "Application metrics scrape down: lolek on beast"
              description: "Prometheus has been unable to scrape the lolek metrics endpoint on beast for 5 minutes."
      - eval_time: 5m30s
        alertname: ApplicationMetricsScrapeDown

  - interval: 30s
    input_series:
      - series: 'up{job="searxng",instance="org"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: ApplicationMetricsScrapeDown
      - eval_time: 5m
        alertname: ApplicationMetricsScrapeDown
        exp_alerts:
          - exp_labels:
              alertname: ApplicationMetricsScrapeDown
              category: service
              instance: org
              job: searxng
              severity: warning
            exp_annotations:
              summary: "Application metrics scrape down: searxng on org"
              description: "Prometheus has been unable to scrape the searxng metrics endpoint on org for 5 minutes."
      - eval_time: 5m30s
        alertname: ApplicationMetricsScrapeDown
