rule_files:
  - ../rules/control-plane.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'prometheus_config_last_reload_successful{job="prometheus",instance="127.0.0.1:9090"}'
        values: "1x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: PrometheusConfigReloadFailed

  - interval: 30s
    input_series:
      - series: 'prometheus_config_last_reload_successful{job="prometheus",instance="127.0.0.1:9090"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: PrometheusConfigReloadFailed
      - eval_time: 5m
        alertname: PrometheusConfigReloadFailed
        exp_alerts:
          - exp_labels:
              alertname: PrometheusConfigReloadFailed
              category: observability
              instance: "127.0.0.1:9090"
              job: prometheus
              severity: warning
            exp_annotations:
              summary: "Prometheus config reload failed"
              description: "Prometheus on fana has not successfully reloaded its configuration for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'prometheus_notifications_errors_total{job="prometheus",instance="127.0.0.1:9090",alertmanager="http://127.0.0.1:9093/api/v2/alerts"}'
        values: "0 1x40"
      - series: 'prometheus_notifications_dropped_total{job="prometheus",instance="127.0.0.1:9090",alertmanager="http://127.0.0.1:9093/api/v2/alerts"}'
        values: "0x41"
    alert_rule_test:
      - eval_time: 5m
        alertname: PrometheusAlertDeliveryFailing
      - eval_time: 5m30s
        alertname: PrometheusAlertDeliveryFailing
        exp_alerts:
          - exp_labels:
              alertname: PrometheusAlertDeliveryFailing
              category: observability
              instance: "127.0.0.1:9090"
              job: prometheus
              severity: warning
            exp_annotations:
              summary: "Prometheus alert delivery failing"
              description: "Prometheus on fana has seen alert delivery errors or drops while sending notifications to Alertmanager within the last 15 minutes."

  - interval: 30s
    input_series:
      - series: 'prometheus_rule_evaluation_failures_total{job="prometheus",instance="127.0.0.1:9090",rule_group="/prometheus/rules/storage-health"}'
        values: "0 1x40"
      - series: 'prometheus_rule_evaluation_failures_total{job="prometheus",instance="127.0.0.1:9090",rule_group="/prometheus/rules/pki-health"}'
        values: "0x41"
    alert_rule_test:
      - eval_time: 5m
        alertname: PrometheusRuleEvaluationFailing
      - eval_time: 5m30s
        alertname: PrometheusRuleEvaluationFailing
        exp_alerts:
          - exp_labels:
              alertname: PrometheusRuleEvaluationFailing
              category: observability
              instance: "127.0.0.1:9090"
              job: prometheus
              severity: warning
            exp_annotations:
              summary: "Prometheus rule evaluation failing"
              description: "Prometheus on fana has seen rule evaluation failures within the last 15 minutes."

  - interval: 30s
    input_series:
      - series: 'up{job="alertmanager",instance="fana"}'
        values: "1x12"
      - series: 'up{job="grafana",instance="fana"}'
        values: "1x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: AlertmanagerMetricsScrapeDown
      - eval_time: 5m
        alertname: GrafanaMetricsScrapeDown

  - interval: 30s
    input_series:
      - series: 'up{job="alertmanager",instance="fana"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: AlertmanagerMetricsScrapeDown
      - eval_time: 5m
        alertname: AlertmanagerMetricsScrapeDown
        exp_alerts:
          - exp_labels:
              alertname: AlertmanagerMetricsScrapeDown
              category: observability
              instance: fana
              job: alertmanager
              severity: warning
            exp_annotations:
              summary: "Alertmanager metrics scrape down"
              description: "Prometheus has been unable to scrape Alertmanager on fana for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'alertmanager_config_last_reload_successful{job="alertmanager",instance="fana"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: AlertmanagerConfigReloadFailed
      - eval_time: 5m
        alertname: AlertmanagerConfigReloadFailed
        exp_alerts:
          - exp_labels:
              alertname: AlertmanagerConfigReloadFailed
              category: observability
              instance: fana
              job: alertmanager
              severity: warning
            exp_annotations:
              summary: "Alertmanager config reload failed"
              description: "Alertmanager on fana has not successfully reloaded its configuration for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'alertmanager_notifications_failed_total{job="alertmanager",instance="fana",integration="telegram",reason="other"}'
        values: "0 1x40"
    alert_rule_test:
      - eval_time: 5m
        alertname: AlertmanagerTelegramNotificationsFailing
      - eval_time: 5m30s
        alertname: AlertmanagerTelegramNotificationsFailing
        exp_alerts:
          - exp_labels:
              alertname: AlertmanagerTelegramNotificationsFailing
              category: observability
              instance: fana
              job: alertmanager
              severity: warning
            exp_annotations:
              summary: "Alertmanager Telegram notifications failing"
              description: "Alertmanager on fana has seen failed Telegram notification deliveries within the last 15 minutes."

  - interval: 30s
    input_series:
      - series: 'alertmanager_notification_requests_failed_total{job="alertmanager",instance="fana",integration="telegram"}'
        values: "0 1x40"
    alert_rule_test:
      - eval_time: 5m
        alertname: AlertmanagerTelegramNotificationRequestsFailing
      - eval_time: 5m30s
        alertname: AlertmanagerTelegramNotificationRequestsFailing
        exp_alerts:
          - exp_labels:
              alertname: AlertmanagerTelegramNotificationRequestsFailing
              category: observability
              instance: fana
              job: alertmanager
              severity: warning
            exp_annotations:
              summary: "Alertmanager Telegram notification requests failing"
              description: "Alertmanager on fana has seen failed Telegram notification attempts within the last 15 minutes, even if a later retry eventually succeeded."

  - interval: 30s
    input_series:
      - series: 'up{job="grafana",instance="fana"}'
        values: "0x10 1x2"
    alert_rule_test:
      - eval_time: 4m30s
        alertname: GrafanaMetricsScrapeDown
      - eval_time: 5m
        alertname: GrafanaMetricsScrapeDown
        exp_alerts:
          - exp_labels:
              alertname: GrafanaMetricsScrapeDown
              category: observability
              instance: fana
              job: grafana
              severity: warning
            exp_annotations:
              summary: "Grafana metrics scrape down"
              description: "Prometheus has been unable to scrape Grafana on fana for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'grafana_api_response_status_total{job="grafana",instance="fana",code="500"}'
        values: "0 1x40"
    alert_rule_test:
      - eval_time: 5m
        alertname: GrafanaAPIErrors
      - eval_time: 5m30s
        alertname: GrafanaAPIErrors
        exp_alerts:
          - exp_labels:
              alertname: GrafanaAPIErrors
              category: observability
              instance: fana
              job: grafana
              severity: warning
            exp_annotations:
              summary: "Grafana API errors on fana"
              description: "Grafana on fana has returned HTTP 500 responses within the last 15 minutes."
