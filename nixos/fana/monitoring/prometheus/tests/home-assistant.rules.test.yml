rule_files:
  - ../rules/home-assistant.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{job="node-mtls",instance="home",name="home-assistant.service",state="active"}'
        values: "0x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: HomeAssistantServiceInactive
        exp_alerts:
          - exp_labels:
              alertname: HomeAssistantServiceInactive
              category: service
              instance: home
              job: node-mtls
              name: home-assistant.service
              severity: warning
              state: active
            exp_annotations:
              summary: "Home Assistant service inactive"
              description: "The Home Assistant systemd service has not been active for 5 minutes."
