rule_files:
  - ../rules/home-assistant.rules.yml

evaluation_interval: 30s

tests:
  - interval: 30s
    input_series:
      - series: 'node_systemd_unit_state{job="node-mtls",instance="home",name="home-assistant.service",state="active"}'
        values: "0x12"
    alert_rule_test:
      - eval_time: 5m
        alertname: HomeAssistantServiceInactive
        exp_alerts:
          - exp_labels:
              alertname: HomeAssistantServiceInactive
              category: service
              instance: home
              job: node-mtls
              name: home-assistant.service
              severity: warning
              state: active
            exp_annotations:
              summary: "Home Assistant service inactive"
              description: "The Home Assistant systemd service has not been active for 5 minutes."

  - interval: 30s
    input_series:
      - series: 'homeassistant_entity_available{job="home-assistant",entity="light.kitchen"}'
        values: "0x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="light.hall"}'
        values: "0x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="switch.porch"}'
        values: "1x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="sensor.inside"}'
        values: "1x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="sensor.outside"}'
        values: "1x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: HomeAssistantEntitiesUnavailable
        exp_alerts:
          - exp_labels:
              alertname: HomeAssistantEntitiesUnavailable
              category: home-automation
              severity: warning
            exp_annotations:
              summary: "Many Home Assistant entities unavailable"
              description: "More than 25% of Home Assistant entities have been unavailable or unknown for 15 minutes."

  - interval: 30s
    input_series:
      - series: 'homeassistant_entity_available{job="home-assistant",entity="light.kitchen"}'
        values: "0x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="switch.porch"}'
        values: "1x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="sensor.inside"}'
        values: "1x32"
      - series: 'homeassistant_entity_available{job="home-assistant",entity="sensor.outside"}'
        values: "1x32"
    alert_rule_test:
      - eval_time: 15m
        alertname: HomeAssistantEntitiesUnavailable
