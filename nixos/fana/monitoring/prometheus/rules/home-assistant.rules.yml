groups:
  - name: home-assistant
    interval: 30s
    rules:
      - alert: HomeAssistantServiceInactive
        expr: node_systemd_unit_state{job="node-mtls",instance="home",name="home-assistant.service",state="active"} < 1
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Home Assistant service inactive"
          description: "The Home Assistant systemd service has not been active for 5 minutes."
