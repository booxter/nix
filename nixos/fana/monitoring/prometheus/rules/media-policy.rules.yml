groups:
  - name: media-policy
    interval: 30s
    rules:
      - alert: MediaPolicyUnitDown
        expr: node_systemd_unit_state{job="node-mtls",instance="srvarr",name=~"(jellyfin-upload-policy|jellyfin-upload-policy-transmission|jellyfin-upload-policy-tc|transmission-prioritizer)\\.service",state="active"} < 1
        for: 5m
        labels:
          severity: warning
          category: media
        annotations:
          summary: "Media policy unit down: {{ $labels.name }}"
          description: "The media pipeline policy unit {{ $labels.name }} on srvarr has not been active for 5 minutes."
      - alert: AdaptiveUploadMissingRemoteBitrateData
        expr: host_observability_adaptive_upload_active_external_media_streams{instance="srvarr"} > 0 and on(instance) host_observability_adaptive_upload_missing_external_media_bitrate_sessions{instance="srvarr"} > 0
        for: 10m
        labels:
          severity: warning
          category: media
        annotations:
          summary: "Adaptive upload missing remote bitrate data on srvarr"
          description: "The adaptive upload controller on srvarr is seeing active external Jellyfin streams with missing bitrate data for at least 10 minutes."
