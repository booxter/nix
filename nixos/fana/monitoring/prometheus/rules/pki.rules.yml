groups:
  - name: pki-health
    interval: 30s
    rules:
      - alert: InternalPKICertMissing
        expr: label_replace(host_observability_pki_cert_parse_success{job="node-mtls",instance="pki"}, "cert_category", "$1", "category", "(.*)") < 1
        for: 10m
        labels:
          severity: critical
          category: pki
        annotations:
          summary: "Managed PKI cert missing: {{ $labels.host }} / {{ $labels.cert_name }}"
          description: "The managed certificate {{ $labels.cert_name }} for {{ $labels.host }} ({{ $labels.cert_category }}) is expected but missing or unparsable in the repo-managed PKI inventory."
      - alert: PKIInventoryTelemetryMissing
        expr: absent(host_observability_pki_cert_expected{job="node-mtls",instance="pki"}) and on(instance) up{job="node-mtls",instance="pki"} == 1
        for: 15m
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI inventory telemetry missing on pki"
          description: "The PKI inventory metrics are missing from pki even though node telemetry is still reachable."
      - alert: InternalPKICertExpiringSoon
        expr: label_replace(host_observability_pki_cert_days_remaining{job="node-mtls",instance="pki"}, "cert_category", "$1", "category", "(.*)") < 30
        for: 30m
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "Managed PKI cert expiring soon: {{ $labels.host }} / {{ $labels.cert_name }}"
          description: "The managed certificate {{ $labels.cert_name }} for {{ $labels.host }} ({{ $labels.cert_category }}) has less than 30 days remaining."
      - alert: InternalPKICertExpiringCritical
        expr: label_replace(host_observability_pki_cert_days_remaining{job="node-mtls",instance="pki"}, "cert_category", "$1", "category", "(.*)") < 14
        for: 30m
        labels:
          severity: critical
          category: pki
        annotations:
          summary: "Managed PKI cert expiring critically soon: {{ $labels.host }} / {{ $labels.cert_name }}"
          description: "The managed certificate {{ $labels.cert_name }} for {{ $labels.host }} ({{ $labels.cert_category }}) has less than 14 days remaining."
      - alert: PublicTLSCertExpiringSoon
        expr: ((probe_ssl_earliest_cert_expiry{job="blackbox-arr",scope="external"} - time()) / 86400) < 21
        for: 30m
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "Public TLS cert expiring soon: {{ $labels.instance }}"
          description: "The public HTTPS endpoint {{ $labels.instance }} has less than 21 days remaining on its leaf certificate."
      - alert: PublicTLSCertExpiringCritical
        expr: ((probe_ssl_earliest_cert_expiry{job="blackbox-arr",scope="external"} - time()) / 86400) < 14
        for: 30m
        labels:
          severity: critical
          category: pki
        annotations:
          summary: "Public TLS cert expiring critically soon: {{ $labels.instance }}"
          description: "The public HTTPS endpoint {{ $labels.instance }} has less than 14 days remaining on its leaf certificate."
      - alert: ManualTLSCertExpiringSoon
        expr: ((probe_ssl_earliest_cert_expiry{job="blackbox-arr",tls_rotation="manual"} - time()) / 86400) < 30
        for: 30m
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "Manual TLS cert expiring soon: {{ $labels.service_title }}"
          description: "The manually rotated TLS endpoint {{ $labels.service_title }} ({{ $labels.target }}) has less than 30 days remaining on its leaf certificate."
      - alert: ManualTLSCertExpiringCritical
        expr: ((probe_ssl_earliest_cert_expiry{job="blackbox-arr",tls_rotation="manual"} - time()) / 86400) < 14
        for: 30m
        labels:
          severity: critical
          category: pki
        annotations:
          summary: "Manual TLS cert expiring critically soon: {{ $labels.service_title }}"
          description: "The manually rotated TLS endpoint {{ $labels.service_title }} ({{ $labels.target }}) has less than 14 days remaining on its leaf certificate."
      - alert: PKIRotationControllerFailed
        expr: host_observability_pki_rotation_last_success{job="node-mtls",instance="pki"} < 1
        for: 2h
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI rotation controller failed on pki"
          description: "The most recent scheduled PKI rotation controller run on pki did not complete successfully."
      - alert: PKIRotationControllerStale
        expr: ((time() - host_observability_pki_rotation_last_run_timestamp_seconds{job="node-mtls",instance="pki"}) / 3600) > 36
        for: 2h
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI rotation controller stale on pki"
          description: "The scheduled PKI rotation controller on pki has not completed a run for more than 36 hours."
      - alert: PKIRotationControllerIncomplete
        expr: host_observability_pki_rotation_last_due_count{job="node-mtls",instance="pki"} > host_observability_pki_rotation_last_rotated_count{job="node-mtls",instance="pki"}
        for: 2h
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI rotation controller incomplete on pki"
          description: "The most recent scheduled PKI rotation controller run on pki found more certificates inside the rotation window than it actually reissued."
      - alert: PKIRotationReviewPRMissing
        expr: (host_observability_pki_rotation_last_due_count{job="node-mtls",instance="pki"} > 0) and on(instance,job,branch,base_branch) (host_observability_pki_rotation_last_success{job="node-mtls",instance="pki"} == 1) and on(instance,job,branch,base_branch) (host_observability_pki_rotation_last_pr_open{job="node-mtls",instance="pki"} < 1)
        for: 2h
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI rotation review PR missing on pki"
          description: "The most recent successful PKI rotation controller run on pki found certificates inside the rotation window but did not leave an open review PR."
      - alert: PKIRotationTelemetryMissing
        expr: absent(host_observability_pki_rotation_last_run_timestamp_seconds{job="node-mtls",instance="pki"}) and on(instance) up{job="node-mtls",instance="pki"} == 1
        for: 15m
        labels:
          severity: warning
          category: pki
        annotations:
          summary: "PKI rotation telemetry missing on pki"
          description: "The PKI rotation controller metrics are missing from pki even though node telemetry is still reachable."
