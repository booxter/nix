groups:
  - name: custom-jobs
    interval: 30s
    rules:
      - alert: TransmissionCollectorFailed
        expr: host_observability_transmission_exporter_ok{instance="srvarr"} < 1
        for: 10m
        labels:
          severity: warning
          category: automation
        annotations:
          summary: "Transmission collector failed on srvarr"
          description: "The Transmission metrics collector on srvarr has been reporting unsuccessful iterations for 10 minutes."
      - alert: TransmissionCollectorStale
        expr: (time() - host_observability_transmission_exporter_last_success_timestamp_seconds{instance="srvarr"}) > 600
        for: 5m
        labels:
          severity: warning
          category: automation
        annotations:
          summary: "Transmission collector stale on srvarr"
          description: "The Transmission metrics collector on srvarr has not completed a successful iteration for more than 10 minutes."
      - alert: AdaptiveUploadPolicyExporterFailed
        expr: host_observability_adaptive_upload_exporter_ok{instance="srvarr"} < 1
        for: 10m
        labels:
          severity: warning
          category: automation
        annotations:
          summary: "Adaptive upload controller exporter failed on srvarr"
          description: "The adaptive upload controller on srvarr has been unable to fetch Jellyfin exporter state successfully for 10 minutes."
      - alert: AdaptiveUploadPolicyMetricsStale
        expr: (time() - node_textfile_mtime_seconds{instance="srvarr",file="/var/lib/prometheus-node-exporter-textfile/adaptive-upload-policy.prom"}) > 600
        for: 5m
        labels:
          severity: warning
          category: automation
        annotations:
          summary: "Adaptive upload metrics stale on srvarr"
          description: "The adaptive upload controller metrics file on srvarr has not been refreshed for more than 10 minutes."
      # Open WebUI SearXNG probe metrics are emitted through org's
      # node_exporter textfile collector and scraped by fana's node-mtls job.
      - alert: OpenWebUISearxngProbeTimerDown
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="open-webui-searxng-probe.timer",state="active"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Open WebUI SearXNG probe timer down on org"
          description: "The Open WebUI SearXNG dependency probe timer on org has not been active for 10 minutes."
      - alert: OpenWebUISearxngProbeServiceFailed
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="open-webui-searxng-probe.service",state="failed"} > 0
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Open WebUI SearXNG probe service failed on org"
          description: "The Open WebUI SearXNG dependency probe service on org has remained in the failed state for 5 minutes."
      - alert: OpenWebUISearxngProbeFailed
        expr: host_observability_openwebui_searxng_probe_ok{job="node-mtls",instance="org"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Open WebUI SearXNG probe failed on org"
          description: "The Open WebUI SearXNG dependency probe on org has been failing for 10 minutes."
      - alert: OpenWebUISearxngProbeStale
        expr: (time() - node_textfile_mtime_seconds{job="node-mtls",instance="org",file="/var/lib/prometheus-node-exporter-textfile/open-webui-searxng.prom"}) > 900
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Open WebUI SearXNG probe stale on org"
          description: "The Open WebUI SearXNG dependency probe metrics file on org has not been refreshed for more than 15 minutes."
      - alert: OpenWebUISearxngProbeNoResults
        expr: host_observability_openwebui_searxng_probe_results{job="node-mtls",instance="org"} < 1
        for: 30m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Open WebUI SearXNG probe returned no results on org"
          description: "The Open WebUI SearXNG dependency probe on org has returned zero search results for 30 minutes."
      - alert: SearxngServiceDown
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="searx.service",state="active"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "SearXNG service down on org"
          description: "The SearXNG systemd service on org has not been active for 10 minutes."
      - alert: SearxngOauth2ProxyDown
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="oauth2-proxy-search.service",state="active"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "SearXNG OAuth proxy down on org"
          description: "The oauth2-proxy service protecting SearXNG on org has not been active for 10 minutes."
      # OIDC synthetic probe metrics are emitted on pki through node_exporter's
      # textfile collector and scraped by fana's node-mtls job.
      - alert: OidcSyntheticProbeTimerDown
        expr: node_systemd_unit_state{job="node-mtls",instance="pki",name="kanidm-oidc-synthetic-probe.timer",state="active"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "OIDC synthetic probe timer down on pki"
          description: "The OIDC synthetic probe timer on pki has not been active for 10 minutes."
      - alert: OidcSyntheticProbeServiceFailed
        expr: node_systemd_unit_state{job="node-mtls",instance="pki",name=~"kanidm-oidc-(probe-bootstrap|synthetic-probe)\\.service",state="failed"} > 0
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "OIDC synthetic probe service failed on pki"
          description: "The OIDC synthetic probe bootstrap or runner service on pki has remained in the failed state for 5 minutes."
      - alert: OidcSyntheticProbeFailed
        expr: host_observability_oidc_synthetic_probe_ok{job="node-mtls",instance="pki"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "OIDC synthetic probe failed: {{ $labels.probe }}"
          description: "The OIDC synthetic probe '{{ $labels.probe }}' on pki has been failing for 10 minutes."
      - alert: OidcSyntheticProbeMetricsStale
        expr: (time() - node_textfile_mtime_seconds{job="node-mtls",instance="pki",file="/var/lib/prometheus-node-exporter-textfile/oidc-synthetic.prom"}) > 900
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "OIDC synthetic probe metrics stale on pki"
          description: "The OIDC synthetic probe metrics file on pki has not been refreshed for more than 15 minutes."
      - alert: PaperlessComponentUnhealthy
        expr: max by (instance, job, component) (label_replace(paperless_status_celery_status{job="paperless"} < 1, "component", "celery", "__name__", ".*") or label_replace(paperless_status_classifier_status{job="paperless"} < 1, "component", "classifier", "__name__", ".*") or label_replace(paperless_status_database_status{job="paperless"} < 1, "component", "database", "__name__", ".*") or label_replace(paperless_status_index_status{job="paperless"} < 1, "component", "index", "__name__", ".*") or label_replace(paperless_status_redis_status{job="paperless"} < 1, "component", "redis", "__name__", ".*") or label_replace(paperless_status_sanity_check_status{job="paperless"} < 1, "component", "sanity check", "__name__", ".*"))
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Paperless component unhealthy: {{ $labels.component }} on {{ $labels.instance }}"
          description: "Paperless has reported the {{ $labels.component }} component unhealthy for 10 minutes."
      # Searchless API metrics are collected through its existing JSON
      # endpoints and emitted through org's node_exporter textfile collector.
      - alert: SearchlessMetricsTimerDown
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="searchless-ngx-metrics.timer",state="active"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Searchless metrics timer down on org"
          description: "The Searchless API metrics timer on org has not been active for 10 minutes."
      - alert: SearchlessMetricsServiceFailed
        expr: node_systemd_unit_state{job="node-mtls",instance="org",name="searchless-ngx-metrics.service",state="failed"} > 0
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Searchless metrics service failed on org"
          description: "The Searchless API metrics service on org has remained in the failed state for 5 minutes."
      - alert: SearchlessMetricsCollectionFailed
        expr: searchless_metrics_collection_success{job="node-mtls",instance="org"} < 1
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Searchless metrics collection failed on org"
          description: "The Searchless API metrics collector on org has been failing for 10 minutes."
      - alert: SearchlessComponentUnhealthy
        expr: max by (instance, job, component) (label_replace(searchless_health_success{job="node-mtls",instance="org"} < 1, "component", "health", "__name__", ".*") or label_replace(searchless_paperless_connected{job="node-mtls",instance="org"} < 1, "component", "paperless api", "__name__", ".*") or label_replace(searchless_sync_status_success{job="node-mtls",instance="org"} < 1, "component", "sync", "__name__", ".*") or label_replace(searchless_test_connection_success{job="node-mtls",instance="org"} < 1, "component", "test connection", "__name__", ".*") or label_replace(searchless_vector_store_initialized{job="node-mtls",instance="org"} < 1, "component", "vector store", "__name__", ".*"))
        for: 10m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Searchless component unhealthy: {{ $labels.component }} on {{ $labels.instance }}"
          description: "Searchless has reported the {{ $labels.component }} component unhealthy for 10 minutes."
      - alert: SearchlessMetricsStale
        expr: (time() - node_textfile_mtime_seconds{job="node-mtls",instance="org",file="/var/lib/prometheus-node-exporter-textfile/searchless-ngx.prom"}) > 300
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Searchless metrics stale on org"
          description: "The Searchless API metrics file on org has not been refreshed for more than 5 minutes."
