groups:
  - name: service-probes
    interval: 30s
    rules:
      - alert: BlackboxARRScrapeDown
        expr: max by(job) (up{job="blackbox-arr"}) < 1
        for: 5m
        labels:
          severity: warning
          category: observability
        annotations:
          summary: "Public service probe scrape down"
          description: "Prometheus has been unable to scrape any blackbox-arr probe targets for 5 minutes."
      - alert: BlackboxPublicWANScrapeDown
        expr: max by(job) (up{job="blackbox-public-wan"}) < 1
        for: 5m
        labels:
          severity: warning
          category: observability
        annotations:
          summary: "Public WAN service probe scrape down"
          description: "Prometheus has been unable to scrape any blackbox-public-wan probe targets for 5 minutes."
      - alert: PublicServiceProbeDown
        expr: probe_success{job="blackbox-arr",scope="external"} < 1
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Public service split-DNS probe down: {{ $labels.instance }}"
          description: "The split-DNS blackbox probe for {{ $labels.instance }} has been failing for 5 minutes."
      - alert: PublicServiceWANProbeDown
        expr: probe_success{job="blackbox-public-wan",scope="external"} < 1
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Public service WAN probe down: {{ $labels.service_title }}"
          description: "The WAN blackbox probe for {{ $labels.service_title }} ({{ $labels.public_host }} via {{ $labels.target }}) has been failing for 5 minutes."
      - alert: InternalServiceProbeDown
        expr: probe_success{job="blackbox-arr",scope="internal"} < 1
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Internal service probe down: {{ $labels.service_title }}"
          description: "The internal blackbox probe for {{ $labels.service_title }} ({{ $labels.target }}) has been failing for 5 minutes."
